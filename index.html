function esc(s){
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function renderSquads(){
  var pills='<div class="squad-pills">';
  pills+='<button class="pill" style="background:'+(activeSquad===null?"#4C1D95":"#fff")+';color:'+(activeSquad===null?"#fff":"#6B46C1")+';border-color:#7C3AED" onclick="setSquad(null)">All Squads</button>';
  for(var i=0;i<SQUADS.length;i++){
    var s=SQUADS[i];
    pills+='<button class="pill" style="background:'+(activeSquad===i?s.bg:s.light)+';color:'+(activeSquad===i?"#fff":s.bg)+';border-color:'+s.bg+'" onclick="setSquad('+i+')">'+esc(s.name)+'</button>';
  }
  pills+='</div>';
  var cards='';
  var list=activeSquad!==null?[[activeSquad,SQUADS[activeSquad]]]:SQUADS.map(function(s,i){return[i,s]});
  for(var j=0;j<list.length;j++) cards+=renderSquadCard(list[j][0],list[j][1]);
  return pills+cards;
}

    '<div>'+nameField+'<div class="squad-meta" id="smeta'+idx+'">'+sq.useCases.length+' use cases &middot; '+sq.team.length+' members</div></div>'+
    '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">'+
    '<div class="confidence-row"><span class="conf-label">Confidence</span>'+confBtns+'</div>'+
    '<button class="btn-edit '+(editing?"active":"")+'" onclick="toggleEdit('+idx+')">'+(editing?"&#10003; Done":"&#9998; Edit")+'</button>'+
    '</div></div>';
  var tabs=[["sprints","Sprint Plan"],["raid","RAID Log"],["team","Team"],["deps","Dependencies"]];
  var tabBar='<div class="tab-bar">';
  for(var t=0;t<tabs.length;t++){
    tabBar+='<button class="tab-btn '+(tab===tabs[t][0]?"active":"")+'" style="'+(tab===tabs[t][0]?"color:"+sq.bg:"")+'" onclick="setTab('+idx+',\''+tabs[t][0]+'\')">'+tabs[t][1]+'</button>';
  }
  tabBar+='</div>';
  var body="";
  if(tab==="sprints") body=renderSprintsTab(idx,sq);
  else if(tab==="raid") body=renderRaidTab(idx,sq);
  else if(tab==="team") body=renderTeamTab(idx,sq);
  else body=renderDepsTab(idx,sq);
  return '<div class="squad-card" style="border:1px solid '+sq.border+'">'+header+tabBar+'<div class="tab-body">'+body+'</div></div>';
}

function renderSquadMeta(idx){
  var el=document.getElementById("smeta"+idx);
  if(el) el.innerHTML=SQUADS[idx].useCases.length+" use cases &middot; "+SQUADS[idx].team.length+" members";
}

function renderSprintsTab(idx,sq){
  var editing=!!editingSquads[idx];
  var legend='<div class="phase-legend">';
  var phases=Object.keys(PHASE_COLORS);
  for(var p=0;p<phases.length;p++) legend+='<span class="phase-dot"><span class="phase-swatch" style="background:'+PHASE_COLORS[phases[p]]+'"></span>'+phases[p]+'</span>';
  legend+='</div>';
  if(editing) legend+='<div class="edit-banner">&#9998; Edit mode — click any use case to expand, then edit its name and description below.</div>';
  var hdrCells="";
  for(var s=0;s<SPRINTS.length;s++) hdrCells+='<div class="sprint-hcell" style="background:'+(SPRINTS[s]==="BRP"?"#FCD34D":"#4C1D95")+';color:'+(SPRINTS[s]==="BRP"?"#1F2937":"#fff")+'">'+SPRINTS[s]+'</div>';
  var cards="";
  for(var u=0;u<sq.useCases.length;u++){
    var uc=sq.useCases[u];
    var key=idx+"-"+u;
    var open=!!openCards[key];
    var gridCells="";
    for(var sp=0;sp<SPRINTS.length;sp++){
      var ph=null;
      for(var pp=0;pp<uc.phases.length;pp++){if(uc.phases[pp].s===SPRINTS[sp]){ph=uc.phases[pp];break;}}
      var bg=ph?(PHASE_COLORS[ph.t]||sq.bg):(SPRINTS[sp]==="BRP"?"#FCD34D22":"#F3F4F6");
      gridCells+='<div class="sprint-cell" style="background:'+bg+'">'+(ph?esc(ph.l):"")+'</div>';
    }
    var tags="";
    for(var pp2=0;pp2<uc.phases.length;pp2++){
      var ph2=uc.phases[pp2];
      tags+='<span class="phase-tag" style="background:'+(PHASE_COLORS[ph2.t]||sq.bg)+'22;color:'+(PHASE_COLORS[ph2.t]||sq.bg)+';border-color:'+(PHASE_COLORS[ph2.t]||sq.bg)+'44">'+esc(ph2.s)+': '+esc(ph2.l)+'</span>';
    }
    var nameField=editing
      ?'<input class="edit-input" value="'+esc(uc.name)+'" style="font-weight:700;font-size:12px;color:'+sq.bg+'" onchange="SQUADS['+idx+'].useCases['+u+'].name=this.value" />'
      :'<div class="uc-name" style="color:'+sq.bg+'">'+esc(uc.name)+'</div>';
    var descField=editing
      ?'<textarea class="edit-textarea" onchange="SQUADS['+idx+'].useCases['+u+'].desc=this.value">'+esc(uc.desc)+'</textarea>'
      :'<div class="uc-desc">'+esc(uc.desc)+'</div>';
    var delBtn=editing?'<button class="btn-del" onclick="event.stopPropagation();delUC('+idx+','+u+')">&#10005; Remove</button>':"";
    cards+='<div class="uc-card" style="border-color:'+sq.border+'">'+
      '<div class="uc-header" style="border-bottom-color:'+sq.bg+';background:#fff" onclick="toggleUC(\''+key+'\')">'+
      '<div style="flex:1">'+nameField+(!open?'<div class="uc-preview">'+esc(uc.desc.slice(0,70))+(uc.desc.length>70?"...":"")+'</div>':"")+'</div>'+
      '<div style="display:flex;align-items:center;gap:4px">'+delBtn+'<span style="color:'+sq.bg+';font-size:11px;margin-left:4px">'+(open?"&#9650;":"&#9660;")+'</span></div></div>'+
      (open?'<div class="uc-body">'+descField+
        '<div class="sprint-label" style="margin-top:8px">SPRINT PLAN</div>'+
        '<div class="sprint-header">'+hdrCells+'</div>'+
        '<div class="sprint-grid">'+gridCells+'</div>'+
        '<div class="phase-tags">'+tags+'</div></div>':"")+'</div>';
  }
  var addBtn=editing?'<button class="btn-add" style="background:'+sq.light+';color:'+sq.bg+';border-color:'+sq.bg+'" onclick="addUC('+idx+')">+ Add Use Case</button>':"";
  return legend+cards+addBtn;
}

function renderRaidTab(idx,sq){
  var editing=!!editingSquads[idx];
  var rows="";
  for(var r=0;r<sq.raid.length;r++){
    var ri=sq.raid[r];
    var rag=RAG_COLORS[ri.rag]||"#9CA3AF";
    var typeBg=ri.t==="R"?"#FEE2E2":ri.t==="I"?"#FEF3C7":ri.t==="A"?"#D1FAE5":"#E0F2FE";
    var typeCol=ri.t==="R"?"#B91C1C":ri.t==="I"?"#92400E":ri.t==="A"?"#065F46":"#0369A1";
    if(editing){
      var typeOpts="";
      for(var ti=0;ti<TYPE_OPTS.length;ti++) typeOpts+='<option value="'+TYPE_OPTS[ti]+'"'+(ri.t===TYPE_OPTS[ti]?" selected":"")+'>'+TYPE_OPTS[ti]+'</option>';
      var ragOpts="";
      for(var oi=0;oi<RAG_OPTS.length;oi++) ragOpts+='<option value="'+RAG_OPTS[oi]+'"'+(ri.rag===RAG_OPTS[oi]?" selected":"")+'>'+RAG_OPTS[oi]+'</option>';
      rows+='<tr style="background:'+(r%2===0?"#fff":sq.light)+'">'+
        '<td><input class="edit-input" value="'+esc(ri.id)+'" style="width:80px" onchange="SQUADS['+idx+'].raid['+r+'].id=this.value"></td>'+
        '<td><select class="edit-input" style="width:60px" onchange="SQUADS['+idx+'].raid['+r+'].t=this.value;render()">'+typeOpts+'</select></td>'+
        '<td><textarea class="edit-textarea" style="min-height:38px" onchange="SQUADS['+idx+'].raid['+r+'].desc=this.value">'+esc(ri.desc)+'</textarea></td>'+
        '<td><input class="edit-input" value="'+esc(ri.owner)+'" onchange="SQUADS['+idx+'].raid['+r+'].owner=this.value"></td>'+
        '<td><select class="edit-input" style="width:75px" onchange="SQUADS['+idx+'].raid['+r+'].rag=this.value;render()">'+ragOpts+'</select></td>'+
        '<td><textarea class="edit-textarea" style="min-height:38px" onchange="SQUADS['+idx+'].raid['+r+'].mit=this.value">'+esc(ri.mit)+'</textarea></td>'+
        '<td><button class="btn-del" onclick="delRaid('+idx+','+r+')">&#10005;</button></td></tr>';
    } else {
      rows+='<tr style="background:'+(r%2===0?"#fff":sq.light)+'">'+
        '<td style="color:'+sq.bg+';font-weight:700">'+esc(ri.id)+'</td>'+
        '<td><span class="type-badge" style="background:'+typeBg+';color:'+typeCol+'">'+ri.t+'</span></td>'+
        '<td>'+esc(ri.desc)+'</td>'+
        '<td style="white-space:nowrap">'+esc(ri.owner)+'</td>'+
        '<td style="text-align:center"><span class="rag-dot" style="background:'+rag+'" title="'+ri.rag+'"></span> '+ri.rag+'</td>'+
        '<td style="color:#6B7280">'+esc(ri.mit)+'</td></tr>';
    }
  }
  if(!rows) rows='<tr><td colspan="'+(editing?7:6)+'" style="padding:14px;text-align:center;color:#D1D5DB;font-style:italic">No RAID items yet — click Edit to add</td></tr>';
  var extraCol=editing?'<th>Del</th>':"";
  var addBtn=editing?'<div style="margin-top:10px"><button class="btn-add" style="background:'+sq.light+';color:'+sq.bg+';border-color:'+sq.bg+'" onclick="addRaid('+idx+')">+ Add RAID Item</button></div>':"";
  var banner=editing?'<div class="edit-banner">&#9998; Edit mode — all fields are editable. Use the dropdowns to change Type and RAG status.</div>':"";
  return banner+'<div style="overflow-x:auto"><table class="raid-table"><thead><tr style="background:'+sq.bg+'"><th>ID</th><th>Type</th><th>Description</th><th>Owner</th><th>RAG</th><th>Mitigation</th>'+extraCol+'</tr></thead><tbody>'+rows+'</tbody></table></div>'+addBtn;
}

function renderTeamTab(idx,sq){
  var editing=!!editingSquads[idx];
  var cards="";
  for(var i=0;i<sq.team.length;i++){
    var m=sq.team[i];
    var initials=m.n.split(" ").map(function(w){return w[0]||""}).slice(0,2).join("");
    if(editing){
      cards+='<div class="team-card" style="background:'+sq.light+';border-color:'+sq.border+';min-width:160px">'+
        '<div class="team-avatar" style="background:'+sq.bg+'">'+initials+'</div>'+
        '<input class="edit-input" value="'+esc(m.n)+'" placeholder="Name" style="margin-bottom:4px" onchange="SQUADS['+idx+'].team['+i+'].n=this.value;render()">'+
        '<input class="edit-input" value="'+esc(m.r)+'" placeholder="Role" style="color:'+sq.bg+'" onchange="SQUADS['+idx+'].team['+i+'].r=this.value">'+
        '<div style="text-align:right;margin-top:4px"><button class="btn-del" onclick="delTeam('+idx+','+i+')">&#10005; Remove</button></div></div>';
    } else {
      cards+='<div class="team-card" style="background:'+sq.light+';border-color:'+sq.border+'">'+
        '<div class="team-avatar" style="background:'+sq.bg+'">'+initials+'</div>'+
        '<div class="team-name">'+esc(m.n)+'</div>'+
        '<div class="team-role" style="color:'+sq.bg+'">'+esc(m.r)+'</div></div>';
    }
  }
  var addBtn=editing?'<button class="btn-add" style="background:'+sq.light+';color:'+sq.bg+';border-color:'+sq.bg+';margin-top:8px;width:auto;padding:6px 14px" onclick="addTeam('+idx+')">+ Add Member</button>':"";
  var banner=editing?'<div class="edit-banner" style="margin-bottom:10px">&#9998; Edit mode — update names and roles, or add/remove team members.</div>':"";
  return banner+'<div class="team-grid">'+cards+'</div>'+addBtn;
}

function renderDepsTab(idx,sq){
  var editing=!!editingSquads[idx];
  var items="";
  for(var i=0;i<sq.deps.length;i++){
    if(editing){
      items+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">'+
        '<span class="dep-dot" style="background:'+sq.bg+';flex-shrink:0"></span>'+
        '<input class="edit-input" style="flex:1" value="'+esc(sq.deps[i])+'" onchange="SQUADS['+idx+'].deps['+i+']=this.value">'+
        '<button class="btn-del" onclick="delDep('+idx+','+i+')">&#10005;</button></div>';
    } else {
      items+='<div class="dep-item" style="background:'+sq.light+';border-color:'+sq.border+'">'+
        '<span class="dep-dot" style="background:'+sq.bg+'"></span>'+
        '<span style="font-size:11px;color:#374151">'+esc(sq.deps[i])+'</span></div>';
    }
  }
  if(!items) items='<p style="color:#9CA3AF;font-size:11px;font-style:italic">No dependencies recorded.</p>';
  var addBtn=editing?'<button class="btn-add" style="background:'+sq.light+';color:'+sq.bg+';border-color:'+sq.bg+'" onclick="addDep('+idx+')">+ Add Dependency</button>':"";
  var banner=editing?'<div class="edit-banner">&#9998; Edit mode — update or remove dependencies below.</div>':"";
  return '<div class="section-label">Dependencies</div>'+banner+items+addBtn;
}

function renderBoard(){
  var hdrCells='<th style="background:#4C1D95;color:#fff;text-align:left;padding:6px 10px;min-width:110px">Squad</th>';
  for(var s=0;s<SPRINTS.length;s++) hdrCells+='<th style="background:'+(SPRINTS[s]==="BRP"?"#FCD34D":"#4C1D95")+';color:'+(SPRINTS[s]==="BRP"?"#1F2937":"#fff")+'">'+SPRINTS[s]+'</th>';
  var rows="";
  for(var qi=0;qi<SQUADS.length;qi++){
    var sq=SQUADS[qi],cells="";
    for(var si=0;si<SPRINTS.length;si++){
      var stickies="";
      for(var ui=0;ui<sq.useCases.length;ui++){
        var uc=sq.useCases[ui];
        for(var pi=0;pi<uc.phases.length;pi++){
          if(uc.phases[pi].s===SPRINTS[si]) stickies+='<div class="board-sticky" style="background:'+(PHASE_COLORS[uc.phases[pi].t]||sq.bg)+'">'+esc(uc.phases[pi].l)+'</div>';
        }
      }
      cells+='<td style="background:'+(qi%2===0?"#FAFAFA":"#fff")+'">'+stickies+'</td>';
    }
    rows+='<tr><td class="board-squad-cell" style="background:'+sq.bg+'">'+esc(sq.name)+'</td>'+cells+'</tr>';
  }
  return '<div class="board-wrap"><div class="board-title">Program Board &mdash; PI2 Plan on a Page</div><div style="overflow-x:auto"><table class="board-table"><thead><tr>'+hdrCells+'</tr></thead><tbody>'+rows+'</tbody></table></div></div>';
}

function renderDeps(){
  var cards="";
  for(var i=0;i<SQUADS.length;i++){
    var sq=SQUADS[i],deps="",risks="";
    for(var d=0;d<sq.deps.length;d++){
      deps+='<div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:5px">'+
        '<span style="width:5px;height:5px;border-radius:50%;background:'+sq.bg+';margin-top:4px;flex-shrink:0"></span>'+
        '<span style="font-size:10px;color:#374151">'+esc(sq.deps[d])+'</span></div>';
    }
    for(var r=0;r<sq.raid.length;r++){
      if(sq.raid[r].rag==="Red"||sq.raid[r].rag==="Amber"){
        risks+='<div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:5px">'+
          '<span class="rag-dot" style="background:'+(RAG_COLORS[sq.raid[r].rag]||"#9CA3AF")+';margin-top:2px;flex-shrink:0"></span>'+
          '<span style="font-size:10px;color:#374151">'+esc(sq.raid[r].desc)+'</span></div>';
      }
    }
    cards+='<div style="background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.07);border:1px solid '+sq.border+'">'+
      '<div style="background:'+sq.bg+';padding:10px 14px">'+
      '<div style="color:#fff;font-weight:700;font-size:12px">'+esc(sq.name)+'</div>'+
      '<div style="color:'+sq.border+'cc;font-size:10px">Dependencies &amp; Risks</div></div>'+
      '<div style="padding:12px">'+
      '<div class="section-label">Dependencies</div>'+(deps||'<p style="color:#9CA3AF;font-size:10px;font-style:italic">None recorded</p>')+
      '<div class="section-label" style="margin-top:10px">Top Risks</div>'+(risks||'<p style="color:#9CA3AF;font-size:10px;font-style:italic">No red/amber risks</p>')+
      '</div></div>';
  }
  return '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px">'+cards+'</div>';
}

// ── Actions ─────────────────────────────────────────────────────────────────
function switchView(v,btn){
  currentView=v;
  document.querySelectorAll(".nav-tab").forEach(function(t){t.classList.remove("active")});
  btn.classList.add("active");
  render();
}
function setSquad(i){activeSquad=i;render();}
function setTab(idx,tab){activeTabs[idx]=tab;render();}
function toggleUC(key){openCards[key]=!openCards[key];render();}
function toggleEdit(idx){editingSquads[idx]=!editingSquads[idx];render();}
function setConf(idx,v){SQUADS[idx].confidence=v;render();}

function addUC(idx){
  SQUADS[idx].useCases.push({name:"New Use Case",desc:"Describe this use case...",phases:[]});
  openCards[idx+"-"+(SQUADS[idx].useCases.length-1)]=true;
  render();
}
function delUC(idx,u){
  if(confirm("Remove this use case?")){ SQUADS[idx].useCases.splice(u,1); render(); }
}
function addRaid(idx){
  SQUADS[idx].raid.push({id:"NEW",t:"R",desc:"Describe the risk or dependency",owner:"TBC",rag:"Amber",mit:"Mitigation action"});
  render();
}
function delRaid(idx,r){
  if(confirm("Remove this RAID item?")){ SQUADS[idx].raid.splice(r,1); render(); }
}
function addTeam(idx){
  SQUADS[idx].team.push({n:"New Member",r:"Role"});
  render();
}
function delTeam(idx,i){
  if(confirm("Remove this team member?")){ SQUADS[idx].team.splice(i,1); render(); }
}
function addDep(idx){
  SQUADS[idx].deps.push("New dependency");
  render();
}
function delDep(idx,i){
  SQUADS[idx].deps.splice(i,1); render();
}

function showToast(msg,isError){
  var t=document.getElementById("toast");
  t.textContent=msg;
  t.className="toast show"+(isError?" error":"");
  setTimeout(function(){t.classList.remove("show")},6000);
}
function setProgress(pct,msg){
  document.getElementById("progressBar").style.width=pct+"%";
  if(msg) document.getElementById("progressSub").textContent=msg;
}

// ── PPTX Export ─────────────────────────────────────────────────────────────
function exportPPTX(){
  if(typeof PptxGenJS==="undefined"){showToast("PptxGenJS not loaded — check internet connection and refresh.",true);return;}
  var btn=document.getElementById("exportBtn");
  btn.disabled=true; btn.textContent="Generating...";
  document.getElementById("progressOverlay").classList.add("show");
  setProgress(5,"Setting up...");
  setTimeout(function(){doExport(btn);},100);
}

// This replaces just the doExport function in index.html
// Full 20-slide deck matching PI_Planning_WIP.pptx structure

function doExport(btn){
  try{
    var pres=new PptxGenJS();
    pres.layout="LAYOUT_WIDE"; pres.title="PI2 Planning Workshop";
    var W=13.3,H=7.5;
    var PUR="6B00D7",PURD="4C1D95",PURM="7B2FBE",PURL="EDE9FE",GOLD="FCD34D";
    var WH="FFFFFF",GR1="F3F4F6",GR5="6B7280",GR7="374151",BLK="000000";

    function hdr(s,n){
      s.addText([{text:"BT Group PowerPoint    |",options:{color:GR5,fontSize:9}},{text:"  "+n,options:{color:GR5,fontSize:9,bold:true}}],{x:W-2.8,y:.1,w:2.7,h:.25,align:"right"});
    }
    function phCol(t){return{design:"A78BFA",build:"7C3AED",test:"0891B2",uat:"D97706",live:"10B981"}[t]||"7C3AED";}
    function interstitial(s,text,n){
      s.background={color:PURD};
      s.addText(text,{x:.5,y:H/2-.5,w:W-1,h:1,fontSize:36,fontFace:"Calibri Light",color:WH});
      s.addShape(pres.shapes.RECTANGLE,{x:0,y:H-.35,w:.22,h:.35,fill:{color:"E91E8C"},line:{color:"E91E8C"}});
      s.addShape(pres.shapes.RECTANGLE,{x:W-.22,y:H-.28,w:.22,h:.28,fill:{color:GOLD},line:{color:GOLD}});
      hdr(s,n);
    }
    function agendaSlide(s,title,items,n){
      s.background={color:WH}; hdr(s,n);
      s.addText(title,{x:.35,y:.12,w:W-.7,h:.55,fontSize:24,fontFace:"Calibri Light",color:BLK});
      s.addShape(pres.shapes.LINE,{x:.35,y:.85,w:W-.7,h:0,line:{color:"CCCCCC",pt:.5}});
      var rowH=.72,sy=.96;
      for(var ai=0;ai<items.length;ai++){
        var it=items[ai],y=sy+ai*(rowH+.08);
        var pc=it.type==="BREAK"?"9B9B9B":it.type==="BREAKOUT"?"00A550":it.type==="OBJECTIVE"?"0070C0":it.type==="BACKDROP"?GOLD:PURM;
        var tc=it.type==="BACKDROP"?BLK:WH;
        s.addText(it.n,{x:.35,y:y,w:.65,h:rowH,fontSize:28,fontFace:"Calibri",color:BLK,bold:true,valign:"middle"});
        s.addShape(pres.shapes.ROUNDED_RECTANGLE,{x:1.04,y:y+.06,w:.82,h:.22,fill:{color:pc},line:{color:pc},rectRadius:.04});
        s.addText(it.type,{x:1.04,y:y+.06,w:.82,h:.22,fontSize:7,color:tc,bold:true,align:"center",valign:"middle",margin:0});
        s.addText(it.dur,{x:1.04,y:y+.31,w:.82,h:.2,fontSize:9,color:GR5,align:"center"});
        s.addText(it.title,{x:1.92,y:y,w:7.0,h:.32,fontSize:14,fontFace:"Calibri",color:BLK,bold:true,valign:"bottom"});
        s.addText(it.desc,{x:1.92,y:y+.33,w:7.0,h:.36,fontSize:10,fontFace:"Calibri",color:GR5,valign:"top"});
        s.addText(it.time,{x:W-2.2,y:y,w:2.1,h:.3,fontSize:11,color:BLK,align:"right",valign:"bottom"});
        s.addText(it.aud,{x:W-2.2,y:y+.32,w:2.1,h:.25,fontSize:9.5,color:GR5,italic:true,align:"right"});
        if(ai<items.length-1) s.addShape(pres.shapes.LINE,{x:.35,y:y+rowH+.04,w:W-.7,h:0,line:{color:"DDDDDD",pt:.4}});
      }
    }

    setProgress(5,"Slide 1: Cover...");

    // SLIDE 1 — Cover
    var s1=pres.addSlide(); s1.background={color:"0A0A1A"};
    s1.addText("BT Business AI Ops.",{x:.5,y:.6,w:4.5,h:.5,fontSize:20,fontFace:"Calibri Light",color:WH});
    s1.addText("PI2 Planning\nWorkshop",{x:.5,y:1.15,w:4.5,h:1.8,fontSize:38,fontFace:"Calibri Light",color:WH});
    s1.addText("July 2026",{x:.5,y:3.0,w:4,h:.45,fontSize:18,fontFace:"Calibri Light",color:WH});
