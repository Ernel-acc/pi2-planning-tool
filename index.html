<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', sans-serif; background: #F0EEF8; min-height: 100vh; }

/* ── NAV ── */
nav {
  background: #4C1D95;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px; position: sticky; top: 0; z-index: 200;
  flex-wrap: wrap; gap: 8px;
}
.nav-brand { display: flex; align-items: center; gap: 10px; padding: 10px 0; }
.nav-bar { width: 5px; height: 26px; background: #FCD34D; border-radius: 2px; }
.nav-title { color: #fff; font-weight: 800; font-size: 14px; }
.nav-sub { color: #DDD6FE; font-size: 10px; }
.nav-date { background: rgba(255,255,255,.15); border-radius: 6px; padding: 3px 9px; color: #FCD34D; font-size: 11px; font-weight: 700; }
.nav-right { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; padding: 8px 0; }
.nav-tab { background: none; border: none; color: #DDD6FE; padding: 8px 12px; cursor: pointer; font-size: 11px; font-weight: 400; border-bottom: 2px solid transparent; white-space: nowrap; }
.nav-tab.active { color: #FCD34D; font-weight: 700; border-bottom-color: #FCD34D; }
.btn-export { background: #FCD34D; color: #4C1D95; border: none; border-radius: 7px; padding: 7px 13px; cursor: pointer; font-weight: 800; font-size: 11px; }
.btn-export:hover { opacity: .88; }

/* ── SQUAD SELECTOR ── */
.squad-selector { display: flex; gap: 6px; padding: 12px 20px; flex-wrap: wrap; background: #E9E5F8; border-bottom: 1px solid #D4D0EE; }
.squad-btn {
  border: none; border-radius: 20px; padding: 5px 14px;
  cursor: pointer; font-size: 11px; font-weight: 700;
  transition: all .15s; border: 1.5px solid transparent;
}

/* ── MAIN BOARD ── */
.board-container { padding: 16px 20px; overflow-x: auto; }
.board { min-width: 1400px; }

/* Squad header bar */
.squad-header-bar {
  border-radius: 8px 8px 0 0; padding: 10px 18px;
  display: flex; align-items: center; gap: 12px; margin-bottom: 0;
}
.squad-header-bar h2 { color: #fff; font-size: 18px; font-weight: 800; }

/* Board top section - Team Capacity + Overview + Deps + User Stories */
.board-top { display: grid; grid-template-columns: 200px 1fr 280px 180px; gap: 12px; padding: 12px; background: #fff; border: 1px solid #E5E0F8; margin-bottom: 0; }

.panel-box { border-radius: 8px; overflow: hidden; }
.panel-title { padding: 7px 10px; font-size: 11px; font-weight: 700; color: #fff; text-align: center; }
.panel-body { padding: 8px; background: #F8F6FF; min-height: 80px; }

/* Sticky note */
.sticky {
  border-radius: 4px; padding: 5px 7px; font-size: 9.5px;
  line-height: 1.3; font-weight: 500; cursor: pointer;
  transition: transform .1s, box-shadow .1s;
  word-break: break-word; position: relative;
  box-shadow: 1px 2px 4px rgba(0,0,0,.12);
}
.sticky:hover { transform: scale(1.03); box-shadow: 2px 4px 8px rgba(0,0,0,.18); }
.sticky.yellow { background: #FFE566; color: #1F1F1F; }
.sticky.pink { background: #FF8FAB; color: #1F1F1F; }
.sticky.purple { background: #C084FC; color: #1F1F1F; }
.sticky.green { background: #86EFAC; color: #1F1F1F; }
.sticky.white { background: #fff; color: #374151; border: 1px solid #E5E7EB; }

.sticky-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 5px; }
.sticky-grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }

/* ── SPRINT GRID ── */
.sprint-grid-wrap { background: #fff; border: 1px solid #E5E0F8; border-top: none; }

.sprint-headers { display: grid; border-bottom: 1px solid #E5E0F8; }
.sprint-header-cell {
  background: #6B2FBE; color: #fff; text-align: center;
  padding: 7px 4px; font-size: 11px; font-weight: 700;
  border-right: 1px solid #8B4FDE;
}
.sprint-header-cell.brp { background: #FCD34D; color: #1F2937; }
.week-headers { display: grid; background: #F3F0FF; border-bottom: 2px solid #E5E0F8; }
.week-cell { padding: 4px 2px; font-size: 9px; color: #6B7280; text-align: center; border-right: 1px solid #E5E0F8; font-weight: 500; }

/* ── USE CASE ROW ── */
.uc-row { display: grid; border-bottom: 1px solid #EEE; min-height: 160px; }
.uc-label {
  padding: 10px 10px; border-right: 1px solid #E5E0F8;
  display: flex; flex-direction: column; gap: 4px;
  background: #FAFAFA;
}
.uc-label-badge {
  border-radius: 5px; padding: 5px 8px;
  font-size: 10px; font-weight: 700; color: #fff;
  text-align: center; line-height: 1.3;
}
.uc-label-desc { font-size: 9.5px; color: #6B7280; line-height: 1.4; margin-top: 4px; }

.uc-canvas { position: relative; padding: 10px 8px; display: flex; flex-direction: column; gap: 8px; overflow: visible; }

/* Phase box */
.phase-box {
  border: 1.5px solid #374151; background: #fff; border-radius: 4px;
  padding: 5px 8px; position: relative;
}
.phase-box-header {
  font-size: 9.5px; font-weight: 700; color: #1F2937; margin-bottom: 6px;
  display: flex; align-items: center; gap: 6px;
}
.phase-owner { font-size: 9px; color: #6B7280; font-weight: 400; }
.person-icon { font-size: 14px; }
.phase-stickies { display: flex; flex-wrap: wrap; gap: 4px; }

.phase-row { display: flex; gap: 8px; align-items: flex-start; flex-wrap: wrap; }

/* Big phase label (Solution Build, UAT etc) */
.phase-label-big {
  border-radius: 5px; padding: 10px 14px;
  font-size: 12px; font-weight: 800; color: #fff;
  text-align: center; white-space: nowrap; align-self: center;
}
.phase-label-big.yellow { background: #F59E0B; color: #1F2937; }
.phase-label-big.purple { background: #7C3AED; }
.phase-label-big.green { background: #10B981; }
.phase-label-big.teal { background: #0891B2; }

/* Dependencies floating stickies */
.dep-floating { display: flex; flex-direction: column; gap: 5px; padding: 8px 0 8px 8px; border-left: 2px dashed #E5E0F8; }

/* ── SIDE PANELS ── */
.side-panels { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 12px; background: #fff; border: 1px solid #E5E0F8; border-top: none; }
.deps-panel { background: #F8F6FF; border-radius: 8px; overflow: hidden; }
.deps-panel-title { background: #6B2FBE; color: #fff; padding: 8px 12px; font-size: 12px; font-weight: 700; text-align: center; }
.deps-panel-body { padding: 10px; }
.deps-group { margin-bottom: 10px; }
.deps-group-label { font-size: 10px; font-weight: 700; color: #4C1D95; margin-bottom: 5px; }
.deps-sticky-row { display: flex; flex-wrap: wrap; gap: 5px; }

.stories-panel { background: #F8F6FF; border-radius: 8px; overflow: hidden; }
.stories-panel-title { background: #6B2FBE; color: #fff; padding: 8px 12px; font-size: 12px; font-weight: 700; text-align: center; }
.stories-panel-body { padding: 10px; display: grid; grid-template-columns: repeat(3,1fr); gap: 5px; }
.story-empty { background: #FFE566; border-radius: 4px; height: 50px; opacity: .5; }

/* ── EDIT MODE ── */
.edit-mode-banner { background: #FEF3C7; border: 1px solid #FCD34D; padding: 6px 12px; font-size: 11px; color: #92400E; font-weight: 600; text-align: center; display: none; }
.edit-mode-banner.show { display: block; }
.editable:focus { outline: 2px solid #7C3AED; border-radius: 2px; }

/* ── TOAST ── */
.toast { background: #D1FAE5; border: 1px solid #6EE7B7; padding: 8px 16px; font-size: 11px; color: #065F46; font-weight: 600; display: none; position: fixed; top: 60px; right: 20px; z-index: 300; border-radius: 6px; box-shadow: 0 4px 12px rgba(0,0,0,.15); }
.toast.show { display: block; }
.toast.error { background: #FEE2E2; border-color: #FCA5A5; color: #991B1B; }

/* ── PROGRESS ── */
.progress-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 999; align-items: center; justify-content: center; }
.progress-overlay.show { display: flex; }
.progress-box { background: #fff; border-radius: 12px; padding: 28px 36px; text-align: center; min-width: 260px; }
.progress-title { font-weight: 700; font-size: 15px; color: #4C1D95; margin-bottom: 8px; }
.progress-sub { font-size: 12px; color: #6B7280; margin-bottom: 16px; }
.progress-track { background: #F3F4F6; border-radius: 20px; height: 6px; overflow: hidden; }
.progress-fill { background: #7C3AED; height: 6px; border-radius: 20px; transition: width .3s; }

/* Views */
.view { display: none; }
.view.active { display: block; }
</style>

// ─── ACTIONS ─────────────────────────────────────────────────────────────────
function selectSquad(i) {
  currentSquad = i;
  renderSelector();
  if (currentView === "board") renderBoard();
}

function switchView(v, btn) {
  currentView = v;
  document.querySelectorAll(".nav-tab").forEach(function(t) { t.classList.remove("active"); });
  btn.classList.add("active");
  document.querySelectorAll(".view").forEach(function(el) { el.classList.remove("active"); });
  document.getElementById("view-" + v).classList.add("active");
  if (v === "board") renderBoard();
  else if (v === "program") renderProgramBoard();
  else renderDepsView();
}

function toggleEdit() {
  editMode = !editMode;
  document.getElementById("editBanner").className = "edit-mode-banner" + (editMode ? " show" : "");
  renderSelector();
  showToast(editMode ? "Edit mode on — click any sticky to edit" : "Changes saved!");
}

function showToast(msg, isError) {
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast show" + (isError ? " error" : "");
  setTimeout(function() { t.classList.remove("show"); }, 4000);
}
function setProgress(pct, msg) {
  document.getElementById("progressBar").style.width = pct + "%";
  if (msg) document.getElementById("progressSub").textContent = msg;
}

// ─── PPTX EXPORT ─────────────────────────────────────────────────────────────
function exportPPTX() {
  showToast("Generating PowerPoint...");
  // Full export function from previous version
  var btn = document.getElementById("exportBtn");
  btn.disabled = true;
  document.getElementById("progressOverlay").classList.add("show");
  setProgress(5, "Setting up...");
  setTimeout(function() {
    try {
      if (typeof PptxGenJS === "undefined") { showToast("PptxGenJS not loaded", true); return; }
      var pres = new PptxGenJS();
      pres.layout = "LAYOUT_WIDE"; pres.title = "PI2 Planning Workshop";
      var W=13.3,H=7.5,WH="FFFFFF",PUR="6B00D7",PURD="4C1D95",GOLD="FCD34D",GR5="6B7280";
      function hdr(s,n){s.addText([{text:"BT Group PowerPoint    |",options:{color:GR5,fontSize:9}},{text:"  "+n,options:{color:GR5,fontSize:9,bold:true}}],{x:W-2.8,y:.1,w:2.7,h:.25,align:"right"});}
      setProgress(15,"Cover...");
      var s1=pres.addSlide(); s1.background={color:"0A0A1A"};
      s1.addText("BT Business AI Ops.",{x:.5,y:.6,w:4.5,h:.5,fontSize:20,fontFace:"Calibri Light",color:WH});
      s1.addText("PI2 Planning\nWorkshop",{x:.5,y:1.15,w:4.5,h:1.8,fontSize:38,fontFace:"Calibri Light",color:WH});
      s1.addText("July 2026",{x:.5,y:3.0,w:4,h:.45,fontSize:18,fontFace:"Calibri Light",color:WH});
      s1.addShape(pres.shapes.RECTANGLE,{x:0,y:H-.35,w:.22,h:.35,fill:{color:PUR},line:{color:PUR}});
      s1.addShape(pres.shapes.RECTANGLE,{x:.22,y:H-.35,w:.22,h:.35,fill:{color:"E91E8C"},line:{color:"E91E8C"}});
      s1.addShape(pres.shapes.RECTANGLE,{x:.44,y:H-.35,w:.22,h:.35,fill:{color:GOLD},line:{color:GOLD}});
      setProgress(30,"Squad slides...");
      var slideNum=2;
      for(var qi=0;qi<SQUADS.length;qi++){
        var sq=SQUADS[qi],bg=sq.color.replace("#","");
        setProgress(30+Math.round(qi/SQUADS.length*55),sq.name+"...");
        var ss=pres.addSlide(); ss.background={color:WH}; hdr(ss,slideNum++);
        ss.addShape(pres.shapes.RECTANGLE,{x:0,y:0,w:W,h:.9,fill:{color:bg},line:{color:bg}});
        ss.addText(sq.name,{x:.3,y:0,w:10,h:.9,fontSize:22,fontFace:"Calibri",color:WH,bold:true,valign:"middle"});
        ss.addText("Confidence: "+sq.confidence+"/5",{x:W-2,y:.05,w:1.8,h:.4,fontSize:11,color:"DDD6FE",align:"right"});
        var colW=2.5,cardH=1.4,cols=4;
        for(var ui=0;ui<Math.min(sq.useCases.length,8);ui++){
          var uc=sq.useCases[ui],col=ui%cols,row=Math.floor(ui/cols);
          var cx=.3+col*(colW+.1),cy=1.0+row*(cardH+.1);
          ss.addShape(pres.shapes.RECTANGLE,{x:cx,y:cy,w:colW,h:cardH,fill:{color:WH},line:{color:bg+"55",pt:1}});
          ss.addShape(pres.shapes.RECTANGLE,{x:cx,y:cy,w:colW,h:.06,fill:{color:bg},line:{color:bg}});
          ss.addText(uc.name,{x:cx+.08,y:cy+.1,w:colW-.16,h:.35,fontSize:9,color:bg,bold:true});
          ss.addText(uc.desc,{x:cx+.08,y:cy+.45,w:colW-.16,h:.85,fontSize:7,color:"374151",valign:"top"});
        }
      }
      setProgress(88,"Confidence vote...");
      var cv=pres.addSlide(); cv.background={color:WH}; hdr(cv,slideNum++);
      cv.addText("Confidence Voting",{x:.35,y:.1,w:W-.7,h:.6,fontSize:26,fontFace:"Calibri",color:PUR,bold:true});
      var cvcols=[{l:"SQUADS",w:2.55},{l:"Work Stream",w:3.8},{l:"Confidence Voting",w:W-2.55-3.8-.7}];
      var cvcx=.35,cvhy=1.05,cvrh=.92;
      for(var ci=0;ci<cvcols.length;ci++){cv.addShape(pres.shapes.RECTANGLE,{x:cvcx,y:cvhy,w:cvcols[ci].w,h:.48,fill:{color:PUR},line:{color:PUR}});cv.addText(cvcols[ci].l,{x:cvcx,y:cvhy,w:cvcols[ci].w,h:.48,fontSize:12,color:WH,bold:true,align:"center",valign:"middle",margin:0});cvcx+=cvcols[ci].w;}
      for(var qi2=0;qi2<SQUADS.length;qi2++){
        var sq2=SQUADS[qi2],cvy=cvhy+.48+qi2*cvrh,cvbg=qi2%2===0?"EDE9FE":"F3F4F6"; cvcx=.35;
        for(var ci2=0;ci2<cvcols.length;ci2++){cv.addShape(pres.shapes.RECTANGLE,{x:cvcx,y:cvy,w:cvcols[ci2].w,h:cvrh,fill:{color:cvbg},line:{color:"DDDDDD",pt:.3}});cvcx+=cvcols[ci2].w;}
        cv.addText(sq2.name.toUpperCase(),{x:.43,y:cvy,w:cvcols[0].w-.16,h:cvrh,fontSize:11,color:"000000",bold:true,valign:"middle"});
        cv.addText(sq2.confidence+"/5",{x:.35+cvcols[0].w+cvcols[1].w+.2,y:cvy+cvrh/2-.2,w:cvcols[2].w-.4,h:.4,fontSize:18,color:sq2.color.replace("#",""),bold:true,align:"center"});
      }
      setProgress(95,"Saving...");
      var cls=pres.addSlide(); cls.background={color:PURD};
      cls.addText("Day 2 Ends - Thanks",{x:.5,y:H/2-.5,w:W-1,h:1,fontSize:38,fontFace:"Calibri Light",color:WH});
      pres.writeFile({fileName:"PI2_Planning_Workshop_July2026.pptx"}).then(function(){
        setProgress(100,"Done!");
        setTimeout(function(){
          document.getElementById("progressOverlay").classList.remove("show");
          btn.disabled=false; btn.textContent="Export to PowerPoint";
          showToast("PowerPoint downloaded successfully!");
        },500);
      });
    } catch(err) {
      document.getElementById("progressOverlay").classList.remove("show");
      btn.disabled=false; btn.textContent="Export to PowerPoint";
      showToast("Export failed: "+err.message, true);
    }
  }, 100);
}

// ─── BOOT ────────────────────────────────────────────────────────────────────
renderSelector();
renderBoard();
</script>
