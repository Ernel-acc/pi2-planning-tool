<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BT AI Ops – PI Planning Tool</title>
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#F0EEF8;min-height:100vh}
nav{background:#4C1D95;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:200;flex-wrap:wrap;gap:8px}
.nav-brand{display:flex;align-items:center;gap:10px;padding:10px 0}
.nav-bar{width:5px;height:26px;background:#FCD34D;border-radius:2px}
.nav-title{color:#fff;font-weight:800;font-size:14px}
.nav-sub{color:#DDD6FE;font-size:10px}
.nav-date{background:rgba(255,255,255,.15);border-radius:6px;padding:3px 9px;color:#FCD34D;font-size:11px;font-weight:700}
.nav-right{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:8px 0}
.nav-tab{background:none;border:none;color:#DDD6FE;padding:8px 12px;cursor:pointer;font-size:11px;font-weight:400;border-bottom:2px solid transparent;white-space:nowrap}
.nav-tab.active{color:#FCD34D;font-weight:700;border-bottom-color:#FCD34D}
.btn-export{background:#FCD34D;color:#4C1D95;border:none;border-radius:7px;padding:7px 13px;cursor:pointer;font-weight:800;font-size:11px}
.squad-selector{display:flex;gap:6px;padding:12px 20px;flex-wrap:wrap;background:#E9E5F8;border-bottom:1px solid #D4D0EE;align-items:center}
.squad-btn{border:none;border-radius:20px;padding:5px 14px;cursor:pointer;font-size:11px;font-weight:700;transition:all .15s}
.board-container{padding:16px 20px;overflow-x:auto}
.board{min-width:1400px}
.squad-header-bar{border-radius:8px 8px 0 0;padding:10px 18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.board-top{display:grid;grid-template-columns:200px 1fr 280px 180px;gap:12px;padding:12px;background:#fff;border:1px solid #E5E0F8}
.panel-box{border-radius:8px;overflow:hidden}
.panel-title{padding:7px 10px;font-size:11px;font-weight:700;color:#fff;text-align:center}
.panel-body{padding:8px;background:#F8F6FF;min-height:80px}
/* Sticky notes */
.sticky{border-radius:4px;padding:5px 7px;font-size:9.5px;line-height:1.3;font-weight:500;word-break:break-word;box-shadow:1px 2px 4px rgba(0,0,0,.12);display:inline-block;position:relative}
.sticky.yellow{background:#FFE566;color:#1F1F1F}
.sticky.pink{background:#FF8FAB;color:#1F1F1F}
.sticky.purple{background:#C084FC;color:#1F1F1F}
.sticky.green{background:#86EFAC;color:#1F1F1F}
.sticky-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:5px}
/* Sprint grid */
.sprint-grid-wrap{background:#fff;border:1px solid #E5E0F8;border-top:none}
.sprint-header-cell{background:#6B2FBE;color:#fff;text-align:center;padding:7px 4px;font-size:11px;font-weight:700;border-right:1px solid #8B4FDE}
.sprint-header-cell.brp{background:#FCD34D;color:#1F2937}
.week-cell{padding:4px 2px;font-size:9px;color:#6B7280;text-align:center;border-right:1px solid #E5E0F8;font-weight:500}
/* Phase boxes - draggable */
.phase-box{border:1.5px solid #374151;background:#fff;border-radius:4px;padding:6px 8px;position:absolute;cursor:grab;user-select:none;min-height:80px;box-shadow:1px 2px 6px rgba(0,0,0,.1);transition:box-shadow .1s}
.phase-box:active{cursor:grabbing;box-shadow:3px 6px 16px rgba(0,0,0,.2)}
.phase-box.dragging{opacity:.85;z-index:100;box-shadow:4px 8px 20px rgba(0,0,0,.25)}
.phase-box-header{font-size:9px;font-weight:700;color:#1F2937;margin-bottom:5px;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.phase-owner{font-size:8.5px;color:#6B7280;font-weight:400}
.phase-stickies{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.phase-label-big{border-radius:5px;padding:7px 10px;font-size:11px;font-weight:800;color:#fff;text-align:center;white-space:nowrap;margin-bottom:4px;display:inline-block}
.phase-label-big.yellow{background:#F59E0B;color:#1F2937}
.phase-label-big.purple{background:#7C3AED}
.phase-label-big.green{background:#10B981}
.phase-label-big.teal{background:#0891B2}
/* Editable content */
[contenteditable]{outline:none;cursor:text}
[contenteditable]:focus{background:rgba(255,255,0,.25);border-radius:2px;outline:2px solid #7C3AED}
.edit-banner{background:#FEF3C7;border:1px solid #FCD34D;padding:6px 12px;font-size:11px;color:#92400E;font-weight:600;text-align:center;display:none}
.edit-banner.show{display:block}
/* Add buttons */
.btn-add{background:rgba(109,47,190,.08);border:1.5px dashed #6B2FBE;border-radius:4px;padding:3px 8px;font-size:9px;color:#4C1D95;cursor:pointer;font-weight:700;margin-top:4px}
.btn-add:hover{background:rgba(109,47,190,.15)}
.btn-del{background:#FEE2E2;color:#B91C1C;border:none;border-radius:3px;padding:1px 5px;cursor:pointer;font-size:8px;font-weight:700;margin-left:4px}
/* Side panels */
.side-panels{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:12px;background:#fff;border:1px solid #E5E0F8;border-top:none}
.deps-panel{background:#F8F6FF;border-radius:8px;overflow:hidden}
.deps-panel-title{background:#6B2FBE;color:#fff;padding:8px 12px;font-size:12px;font-weight:700;text-align:center}
.deps-panel-body{padding:10px}
.deps-group{margin-bottom:10px}
.deps-group-label{font-size:10px;font-weight:700;color:#4C1D95;margin-bottom:5px}
.deps-sticky-row{display:flex;flex-wrap:wrap;gap:5px}
.stories-panel{background:#F8F6FF;border-radius:8px;overflow:hidden}
.stories-panel-title{background:#6B2FBE;color:#fff;padding:8px 12px;font-size:12px;font-weight:700;text-align:center}
.stories-panel-body{padding:10px;display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.story-empty{background:#FFE566;border-radius:4px;height:50px;opacity:.4}
/* Toast */
.toast{background:#D1FAE5;border:1px solid #6EE7B7;padding:8px 16px;font-size:11px;color:#065F46;font-weight:600;display:none;position:fixed;top:60px;right:20px;z-index:300;border-radius:6px;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.toast.show{display:block}
.toast.error{background:#FEE2E2;border-color:#FCA5A5;color:#991B1B}
.loading{display:flex;align-items:center;justify-content:center;padding:60px;font-size:14px;color:#6B7280}
.spinner{width:24px;height:24px;border:3px solid #EDE9FE;border-top-color:#7C3AED;border-radius:50%;animation:spin .8s linear infinite;margin-right:10px}
@keyframes spin{to{transform:rotate(360deg)}}
.progress-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:999;align-items:center;justify-content:center}
.progress-overlay.show{display:flex}
.progress-box{background:#fff;border-radius:12px;padding:28px 36px;text-align:center;min-width:260px}
.progress-title{font-weight:700;font-size:15px;color:#4C1D95;margin-bottom:8px}
.progress-sub{font-size:12px;color:#6B7280;margin-bottom:16px}
.progress-track{background:#F3F4F6;border-radius:20px;height:6px;overflow:hidden}
.progress-fill{background:#7C3AED;height:6px;border-radius:20px;transition:width .3s}
.view{display:none}
.view.active{display:block}

.resize-handle{position:absolute;top:0;width:8px;height:100%;cursor:ew-resize;z-index:20;display:none;border-radius:4px}
.resize-handle.left{left:-4px}
.resize-handle.right{right:-4px}
.resize-handle:hover,.phase-box:hover .resize-handle{display:block;background:rgba(109,47,190,.2)}
.person-avatar{width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff;flex-shrink:0;border:2px solid rgba(255,255,255,.7);margin-right:3px}
.free-sticky{position:absolute;border-radius:4px;padding:6px 8px 4px;font-size:9.5px;line-height:1.3;font-weight:500;cursor:grab;user-select:none;box-shadow:2px 3px 8px rgba(0,0,0,.18);min-width:70px;max-width:140px;z-index:10;word-break:break-word}
.free-sticky:active{cursor:grabbing}
.free-sticky.yellow{background:#FFE566;color:#1F1F1F}
.free-sticky.pink{background:#FF8FAB;color:#1F1F1F}
.free-sticky.purple{background:#C084FC;color:#1F1F1F}
.free-sticky.green{background:#86EFAC;color:#1F1F1F}
.uc-canvas-wrap{position:relative;overflow:visible}
.add-free-btn{position:absolute;bottom:6px;right:6px;background:#FCD34D;color:#4C1D95;border:none;border-radius:5px;padding:3px 9px;cursor:pointer;font-size:9px;font-weight:700;z-index:20;opacity:0;transition:opacity .15s;pointer-events:auto}
.uc-canvas-wrap:hover .add-free-btn{opacity:1}
</style>
</head>
<body>
<nav>
  <div class="nav-brand">
    <div class="nav-bar"></div>
    <div><div class="nav-sub">BT AI Ops</div><div class="nav-title">PI Planning Tool</div></div>
    <div class="nav-date" id="navDateDisplay" onclick="editNavDate()" title="Click to edit" style="cursor:pointer">PI2 &mdash; July 2026</div>
  </div>
  <div class="nav-right">
    <button class="nav-tab active" onclick="switchView('board',this)">Planning Board</button>
    <button class="nav-tab" onclick="switchView('program',this)">Program Board</button>
    <button class="nav-tab" onclick="switchView('deps',this)">Dependencies</button>
    <button class="btn-export" onclick="exportPPTX()">&#8595; Export to PowerPoint</button>
  </div>
</nav>
<div class="squad-selector" id="squadSelector"><div class="spinner"></div> Loading...</div>
<div class="edit-banner" id="editBanner">&#9998; Edit mode — click any text to edit it directly, drag phase boxes to move them, use + buttons to add items</div>
<div class="toast" id="toast"></div>
<div class="view active" id="view-board"><div class="board-container"><div class="board" id="mainBoard"><div class="loading"><div class="spinner"></div> Loading from database...</div></div></div></div>
<div class="view" id="view-program"><div class="board-container"><div id="programBoard"></div></div></div>
<div class="view" id="view-deps"><div class="board-container"><div id="depsView"></div></div></div>
<div class="progress-overlay" id="progressOverlay">
  <div class="progress-box">
    <div class="progress-title">Generating PowerPoint&#8230;</div>
    <div class="progress-sub" id="progressSub">Building slides</div>
    <div class="progress-track"><div class="progress-fill" id="progressBar" style="width:0%"></div></div>
  </div>
</div>
<script>
var SUPA_URL = "https://jzufzorkfharnfvrjewk.supabase.co";
var SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp6dWZ6b3JrZmhhcm5mdnJqZXdrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5Mjk3MTEsImV4cCI6MjA5NjUwNTcxMX0.mGq4Ii_2xA-Le54vMMIKGtvT55Dqo7-5WjpxnsATgeM";
var HDRS = {"apikey":SUPA_KEY,"Authorization":"Bearer "+SUPA_KEY,"Content-Type":"application/json","Prefer":"return=representation"};

function dbGet(table,order){
  return fetch(SUPA_URL+"/rest/v1/"+table+"?select=*&order="+(order||"id"),{headers:HDRS}).then(function(r){return r.json()});
}
function dbPost(table,data){
  return fetch(SUPA_URL+"/rest/v1/"+table,{method:"POST",headers:HDRS,body:JSON.stringify(data)}).then(function(r){return r.json()});
}
function dbPatch(table,col,val,data){
  return fetch(SUPA_URL+"/rest/v1/"+table+"?"+col+"=eq."+val,{method:"PATCH",headers:HDRS,body:JSON.stringify(data)});
}
function dbDelete(table,col,val){
  return fetch(SUPA_URL+"/rest/v1/"+table+"?"+col+"=eq."+val,{method:"DELETE",headers:HDRS});
}

var DB={squads:[],useCases:[],phases:[],stickies:[],floatingDeps:[],depGroups:[],depItems:[],teamMembers:[],userStories:[],freeStickies:[]};
var currentSquad=0,currentView="board",editMode=false;
var SPRINTS=[{name:"Sprint 1",weeks:["wk1","wk2"]},{name:"Sprint 2",weeks:["wk3","wk4"]},{name:"Sprint 3",weeks:["wk5","wk6"]},{name:"Sprint 4",weeks:["wk7","wk8"]},{name:"Sprint 5",weeks:["wk9","wk10"]},{name:"BRP",weeks:["wk11"]},{name:"Sprint 6",weeks:["wk12"]}];
var ALL_WEEKS=["wk1","wk2","wk3","wk4","wk5","wk6","wk7","wk8","wk9","wk10","wk11","wk12"];
var WK=88,LBL=170;

function sq(){return DB.squads[currentSquad]||{}}
function ucsFor(id){return DB.useCases.filter(function(u){return u.squad_id===id})}
function phFor(id){return DB.phases.filter(function(p){return p.use_case_id===id})}
function stFor(id){return DB.stickies.filter(function(s){return s.phase_id===id})}
function fdFor(id){return DB.floatingDeps.filter(function(f){return f.use_case_id===id})}
function grFor(id){return DB.depGroups.filter(function(g){return g.squad_id===id})}
function itFor(id){return DB.depItems.filter(function(i){return i.group_id===id})}
function tmFor(id){return DB.teamMembers.filter(function(t){return t.squad_id===id})}
function wkI(wk){return ALL_WEEKS.indexOf(wk)}

async function loadAll(){
  try{
    var r=await Promise.all([
      dbGet("squads","name"),dbGet("use_cases","sort_order"),dbGet("phases","sort_order"),
      dbGet("stickies","sort_order"),dbGet("floating_deps","sort_order"),dbGet("dep_groups","sort_order"),
      dbGet("dep_items","sort_order"),dbGet("team_members","sort_order"),dbGet("user_stories","sort_order"),dbGet("free_stickies","sort_order")
    ]);
    DB.squads=Array.isArray(r[0])?r[0]:[];
    DB.useCases=Array.isArray(r[1])?r[1]:[];
    DB.phases=Array.isArray(r[2])?r[2]:[];
    DB.stickies=Array.isArray(r[3])?r[3]:[];
    DB.floatingDeps=Array.isArray(r[4])?r[4]:[];
    DB.depGroups=Array.isArray(r[5])?r[5]:[];
    DB.depItems=Array.isArray(r[6])?r[6]:[];
    DB.teamMembers=Array.isArray(r[7])?r[7]:[];
    DB.userStories=Array.isArray(r[8])?r[8]:[];
    DB.freeStickies=Array.isArray(r[9])?r[9]:[];
    if(!DB.squads.length){
      showErr("No data found. Check the SQL ran correctly in Supabase.");return;
    }
    renderSelector();renderBoard();
  }catch(e){showErr(e.message);}
}
function showErr(msg){
  document.getElementById("mainBoard").innerHTML='<div style="padding:40px;color:#B91C1C;text-align:center"><strong>Error:</strong><br>'+msg+'</div>';
  document.getElementById("squadSelector").innerHTML='<span style="color:#B91C1C">'+msg+'</span>';
}

function renderSelector(){
  var h="";
  DB.squads.forEach(function(s,i){
    var a=i===currentSquad;
    h+='<button class="squad-btn" onclick="selectSquad('+i+')" style="background:'+(a?s.color:"#fff")+';color:'+(a?"#fff":s.color)+';border:1.5px solid '+s.color+'">'+s.name+'</button>';
  });
  h+='<button onclick="toggleEdit()" style="margin-left:auto;background:'+(editMode?"#FCD34D":"rgba(255,255,255,.7)")+';color:'+(editMode?"#4C1D95":"#374151")+';border:1.5px solid #D1D5DB;border-radius:20px;padding:5px 14px;cursor:pointer;font-size:11px;font-weight:700">'+(editMode?"&#10003; Save":"&#9998; Edit")+'</button>';
  document.getElementById("squadSelector").innerHTML=h;
}

function renderBoard(){
  var s=sq();if(!s.id)return;
  var h="";
  // Header
  h+='<div class="squad-header-bar" style="background:'+s.color+'">';
  h+='<h2 '+(editMode?'contenteditable="true" onblur="saveSq(\'name\',this.innerText)"':'')+' style="color:#fff;font-size:18px;font-weight:800">'+s.name+'</h2>';
  h+='<div style="display:flex;align-items:center;gap:10px"><div style="background:rgba(255,255,255,.15);border-radius:6px;padding:4px 10px;display:flex;align-items:center;gap:5px"><span style="color:#DDD6FE;font-size:10px">Confidence</span>';
  for(var v=1;v<=5;v++) h+='<button onclick="setConf('+v+')" style="width:20px;height:20px;border-radius:3px;border:none;cursor:pointer;font-size:10px;font-weight:700;background:'+(s.confidence>=v?"#FCD34D":"rgba(255,255,255,.25)")+';color:'+(s.confidence>=v?"#92400E":"rgba(255,255,255,.6)")+'">'+v+'</button>';
  h+='</div></div></div>';

  // Top panels
  h+='<div class="board-top">';
  h+='<div class="panel-box"><div class="panel-title" style="background:'+s.color+'">Team Capacity</div><div class="panel-body"><div class="sticky-grid">';
  tmFor(s.id).forEach(function(m,i){
    h+='<div class="sticky yellow" style="font-size:9px"><strong '+(editMode?'contenteditable="true" onblur="saveTm('+m.id+',\'role\',this.innerText)"':'')+'>'+m.role+'</strong>';
    if(m.name||editMode) h+='<br><span '+(editMode?'contenteditable="true" onblur="saveTm('+m.id+',\'name\',this.innerText)"':'')+'>'+m.name+'</span>';
    if(editMode) h+=' <button class="btn-del" onclick="delTm('+m.id+')">&#10005;</button>';
    h+='</div>';
  });
  if(editMode) h+='<button class="btn-add" onclick="addTm(\''+s.id+'\')">+ member</button>';
  h+='</div></div></div>';

  h+='<div class="panel-box"><div class="panel-title" style="background:'+s.color+'">'+s.name+' &mdash; Workstream Overview</div>';
  h+='<div class="panel-body" style="font-size:10px;color:#374151;padding:10px" '+(editMode?'contenteditable="true" onblur="saveSq(\'notes\',this.innerText)"':'')+'>'+( s.notes||'<em style="color:#9CA3AF">Add workstream overview here...</em>')+'</div></div>';

  // Deps summary
  h+='<div class="panel-box"><div class="panel-title" style="background:'+s.color+'">Dependencies &amp; Risks</div><div class="panel-body">';
  var risks=[],deps=[];
  grFor(s.id).forEach(function(g){itFor(g.id).forEach(function(it){if(it.color==="pink")risks.push(it.text);else deps.push(it.text);});});
  risks.slice(0,2).forEach(function(r){h+='<div class="sticky pink" style="margin-bottom:4px;font-size:9px;display:block">'+r+'</div>';});
  deps.slice(0,2).forEach(function(d){h+='<div class="sticky yellow" style="margin-bottom:4px;font-size:9px;display:block">'+d+'</div>';});
  h+='</div></div>';

  h+='<div class="panel-box"><div class="panel-title" style="background:'+s.color+'">Notes</div>';
  h += '<div class="panel-body" style="font-size:9.5px;color:#374151;min-height:80px" contenteditable="true" onblur="saveSq(\'notes\',this.innerText)">' + (s.notes || '') + '</div></div>';
  h+='</div>';

  // Sprint grid
  var gCols=LBL+"px "+ALL_WEEKS.map(function(){return WK+"px";}).join(" ");
  h+='<div class="sprint-grid-wrap">';
  h+='<div style="display:grid;grid-template-columns:'+LBL+'px '+SPRINTS.map(function(sp){return sp.weeks.length*WK+"px";}).join(" ")+'"><div style="border-right:1px solid #E5E0F8;background:#F8F6FF"></div>';
  SPRINTS.forEach(function(sp){h+='<div class="sprint-header-cell '+(sp.name==="BRP"?"brp":"")+'">'+sp.name+'</div>';});
  h+='</div>';
  h+='<div style="display:grid;grid-template-columns:'+gCols+'"><div style="border-right:1px solid #E5E0F8;background:#F3F0FF;padding:4px 6px;font-size:9px;color:#6B7280;font-weight:600">Use Case</div>';
  ALL_WEEKS.forEach(function(wk){h+='<div class="week-cell">'+wk+'</div>';});
  h+='</div>';

  // UC rows
  ucsFor(s.id).forEach(function(uc){
    var phases=phFor(uc.id);
    var rowH=Math.max(180,phases.length*105+20);
    h+='<div style="display:grid;grid-template-columns:'+LBL+'px 1fr;border-bottom:2px solid '+s.color+'44;min-height:'+rowH+'px">';
    h+='<div class="uc-label" style="padding:10px;border-right:1px solid #E5E0F8;display:flex;flex-direction:column;gap:4px;background:#FAFAFA">';
    h+='<div style="background:'+s.color+';border-radius:5px;padding:5px 8px;font-size:10px;font-weight:700;color:#fff;text-align:center;line-height:1.3" '+(editMode?'contenteditable="true" onblur="saveUC(\''+uc.id+'\',\'name\',this.innerText)"':'')+'>'+uc.name+'</div>';
    h+='<div style="font-size:9.5px;color:#6B7280;line-height:1.4;margin-top:4px" '+(editMode?'contenteditable="true" onblur="saveUC(\''+uc.id+'\',\'description\',this.innerText)"':'')+'>'+uc.description+'</div>';
    if(editMode){
      h+='<button class="btn-add" onclick="addPhase(\''+uc.id+'\')">+ phase</button>';
      h+='<button class="btn-del" style="margin-top:4px" onclick="delUC(\''+uc.id+'\')">&#10005; Remove UC</button>';
    }
    h+='</div>';

    // Canvas with BG columns
    h+='<div class="uc-canvas-wrap" id="canvas-'+uc.id+'">';
    h+='<button class="add-free-btn" onclick="addFreeSticky(\'' + uc.id + '\')">+ sticky</button>';
    h+='<div style="display:grid;grid-template-columns:'+ALL_WEEKS.map(function(){return WK+"px";}).join(" ")+';position:absolute;inset:0;pointer-events:none">';
    ALL_WEEKS.forEach(function(wk,wi){
      h+='<div style="border-right:1px solid #EEE;background:'+(wk==="wk11"?"#FFFBEB":(wi%2===0?"#FAFAFA":"#fff"))+';height:100%"></div>';
    });
    h+='</div>';

    // Phase boxes
    phases.forEach(function(ph,pi){

// ── Drag & drop phase boxes ────────────────────────────────────────────────────
function initDrag(){
  document.querySelectorAll(".phase-box").forEach(function(box){
    box.addEventListener("mousedown",startDrag);
    box.addEventListener("touchstart",startDragTouch,{passive:false});
  });
}
var dragState=null;
function startDrag(e){
  if(e.target.getAttribute("contenteditable")||e.target.tagName==="BUTTON") return;
  e.preventDefault();
  var box=e.currentTarget;
  dragState={box:box,startX:e.clientX,startY:e.clientY,origLeft:parseInt(box.style.left),origTop:parseInt(box.style.top)};
  box.classList.add("dragging");
  document.addEventListener("mousemove",onDrag);
  document.addEventListener("mouseup",endDrag);
}
function startDragTouch(e){
  if(e.target.getAttribute("contenteditable")||e.target.tagName==="BUTTON") return;
  e.preventDefault();
  var t=e.touches[0],box=e.currentTarget;
  dragState={box:box,startX:t.clientX,startY:t.clientY,origLeft:parseInt(box.style.left),origTop:parseInt(box.style.top)};
  box.classList.add("dragging");
  document.addEventListener("touchmove",onDragTouch,{passive:false});
  document.addEventListener("touchend",endDragTouch);
}
function onDrag(e){
  if(!dragState) return;
  var dx=e.clientX-dragState.startX,dy=e.clientY-dragState.startY;
  dragState.box.style.left=(dragState.origLeft+dx)+"px";
  dragState.box.style.top=(dragState.origTop+dy)+"px";
}
function onDragTouch(e){
  if(!dragState) return;
  e.preventDefault();
  var t=e.touches[0],dx=t.clientX-dragState.startX,dy=t.clientY-dragState.startY;
  dragState.box.style.left=(dragState.origLeft+dx)+"px";
  dragState.box.style.top=(dragState.origTop+dy)+"px";
}
function endDrag(e){
  if(!dragState) return;
  dragState.box.classList.remove("dragging");
  // Snap to nearest week column
  var newLeft=parseInt(dragState.box.style.left);
  var snapWk=Math.max(0,Math.min(ALL_WEEKS.length-1,Math.round(newLeft/WK)));
  var snappedLeft=snapWk*WK;
  dragState.box.style.left=snappedLeft+"px";
  // Save new position
  var phId=parseInt(dragState.box.getAttribute("data-ph"));
  var ph=DB.phases.find(function(p){return p.id===phId});
  if(ph){
    var endWkI=wkI(ph.end_week),startWkI=wkI(ph.start_week);
    var span=endWkI-startWkI;
    var newStartWk=ALL_WEEKS[snapWk];
    var newEndWk=ALL_WEEKS[Math.min(ALL_WEEKS.length-1,snapWk+span)];
    ph.start_week=newStartWk; ph.end_week=newEndWk;
    dbPatch("phases","id",phId,{start_week:newStartWk,end_week:newEndWk});
    showToast("Phase moved to "+newStartWk);
  }
  document.removeEventListener("mousemove",onDrag);
  document.removeEventListener("mouseup",endDrag);
  dragState=null;
}
function endDragTouch(e){
  endDrag(e);
  document.removeEventListener("touchmove",onDragTouch);
  document.removeEventListener("touchend",endDragTouch);
}

// ── Program board ─────────────────────────────────────────────────────────────
function renderProgramBoard(){
  var WK_PX=80, LBL_PX=140;
  var totalW=LBL_PX+ALL_WEEKS.length*WK_PX;
  var h='<div style="background:#fff;border-radius:10px;padding:18px;box-shadow:0 2px 12px rgba(0,0,0,.08);overflow-x:auto">';
  h+='<div style="font-weight:800;font-size:15px;color:#4C1D95;margin-bottom:12px">Program Board &mdash; All Squads</div>';
  h+='<div style="min-width:'+totalW+'px">';

  // Sprint headers
  h+='<div style="display:grid;grid-template-columns:'+LBL_PX+'px '+SPRINTS.map(function(sp){return sp.weeks.length*WK_PX+'px';}).join(' ')+'">';
  h+='<div style="background:#4C1D95;padding:7px 10px;color:#fff;font-weight:700;font-size:10px">Squad</div>';
  SPRINTS.forEach(function(sp){
    h+='<div style="background:'+(sp.name==="BRP"?"#FCD34D":"#4C1D95")+';color:'+(sp.name==="BRP"?"#1F2937":"#fff")+';text-align:center;padding:7px 4px;font-weight:700;font-size:10px;border-left:1px solid rgba(255,255,255,.2)">'+sp.name+'</div>';
  });
  h+='</div>';

  // Week sub-headers
  h+='<div style="display:grid;grid-template-columns:'+LBL_PX+'px '+ALL_WEEKS.map(function(){return WK_PX+'px';}).join(' ')+';border-bottom:2px solid #4C1D95">';
  h+='<div style="background:#F3F0FF;padding:3px 8px;font-size:8px;color:#6B7280;font-weight:600">Use Case</div>';
  ALL_WEEKS.forEach(function(wk){
    h+='<div style="background:#F3F0FF;padding:3px 4px;font-size:8px;color:#6B7280;text-align:center;border-left:1px solid #E5E0F8">'+wk+'</div>';
  });
  h+='</div>';

  // Squad rows
  DB.squads.forEach(function(s,qi){
    var ucs=ucsFor(s.id);
    var rowBg=qi%2===0?'#FAFAFA':'#fff';

    // Collect all phases for this squad
    var allPhases=[];
    ucs.forEach(function(uc){
      phFor(uc.id).forEach(function(ph){
        var si=wkI(ph.start_week), ei=wkI(ph.end_week);
        if(si<0)si=0; if(ei<0)ei=ALL_WEEKS.length-1;
        allPhases.push({uc:uc,ph:ph,si:si,ei:ei,row:0});
      });
    });

    // Assign rows to avoid overlaps
    var rowSlots=[];
    allPhases.forEach(function(item){
      var placed=false;
      for(var r=0;r<rowSlots.length;r++){
        var ok=true;
        rowSlots[r].forEach(function(ex){if(!(ex.ei<item.si||ex.si>item.ei))ok=false;});
        if(ok){rowSlots[r].push(item);item.row=r;placed=true;break;}
      }
      if(!placed){rowSlots.push([item]);item.row=rowSlots.length-1;}
    });
    var numRows=rowSlots.length||1;
    var rowH=28, gap=3, pad=5;
    var canvasH=pad+numRows*(rowH+gap);

    h+='<div style="display:grid;grid-template-columns:'+LBL_PX+'px 1fr;border-bottom:2px solid '+s.color+'33">';
    h+='<div style="background:'+s.color+';color:#fff;padding:8px 10px;font-weight:700;font-size:9px;display:flex;align-items:center">'+s.name+'</div>';
    h+='<div style="position:relative;background:'+rowBg+';height:'+canvasH+'px">';

    // Week grid lines
    ALL_WEEKS.forEach(function(wk,wi){
      h+='<div style="position:absolute;left:'+(wi*WK_PX)+'px;top:0;width:'+WK_PX+'px;height:100%;border-right:1px solid #EEE;background:'+(wk==="wk11"?"#FFFBEB":"transparent")+';pointer-events:none"></div>';
    });

    // Phase bars — each one spans its full width
    allPhases.forEach(function(item){
      var left=item.si*WK_PX;
      var width=(item.ei-item.si+1)*WK_PX-4;
      var top=pad+item.row*(rowH+gap);
      var label=item.uc.name.length>22?item.uc.name.slice(0,20)+'...':item.uc.name;
      h+='<div title="'+item.uc.name+' | '+item.ph.name+'" style="position:absolute;left:'+left+'px;top:'+top+'px;width:'+width+'px;height:'+rowH+'px;background:'+s.color+';border-radius:4px;display:flex;align-items:center;padding:0 8px;box-shadow:0 1px 4px rgba(0,0,0,.18);overflow:hidden">';
      h+='<span style="color:#fff;font-size:8px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1">'+label+'</span>';
      h+='<div style="width:5px;height:100%;background:rgba(0,0,0,.2);flex-shrink:0;border-radius:0 4px 4px 0;margin-right:-8px"></div>';
      h+='</div>';
    });

    h+='</div></div>';
  });

  h+='</div></div>';
  document.getElementById("programBoard").innerHTML=h;
}

  var d=await dbPost("floating_deps",{use_case_id:ucId,text:t,sort_order:999});

async function addUC(sqId){
  var n=prompt("Use case name:"); if(!n) return;
  var desc=prompt("Description:","");
  var id=sqId+"_uc_"+Date.now();
  var d=await dbPost("use_cases",{id:id,squad_id:sqId,name:n,description:desc||"",sort_order:999});
  if(Array.isArray(d)&&d[0]) DB.useCases.push(d[0]);
  renderBoard(); showToast("Use case added!");
}
async function delUC(id){
  if(!confirm("Delete this use case and all phases/stickies?")) return;
  var phs=phFor(id);
  for(var i=0;i<phs.length;i++) await dbDelete("stickies","phase_id",phs[i].id);
  await dbDelete("phases","use_case_id",id);
  await dbDelete("floating_deps","use_case_id",id);
  await dbDelete("use_cases","id",id);
  DB.phases=DB.phases.filter(function(p){return p.use_case_id!==id});
  DB.stickies=DB.stickies.filter(function(s){return !phs.find(function(p){return p.id===s.phase_id})});
  DB.floatingDeps=DB.floatingDeps.filter(function(f){return f.use_case_id!==id});
  DB.useCases=DB.useCases.filter(function(u){return u.id!==id});
  renderBoard();
}
async function addPhase(ucId){

// ── Resize phase boxes ────────────────────────────────────────────────────────
var resizeState = null;
function startResize(e, phId, side) {
  e.stopPropagation(); e.preventDefault();
  var box = document.getElementById("ph-" + phId);
  if (!box) return;
  resizeState = { phId:phId, side:side, box:box, startX:e.clientX, origLeft:parseInt(box.style.left), origWidth:parseInt(box.style.width) };
  document.addEventListener("mousemove", onResize);
  document.addEventListener("mouseup", endResize);
}
function onResize(e) {
  if (!resizeState) return;
  var dx = e.clientX - resizeState.startX;
  if (resizeState.side === "right") {
    var nw = Math.max(WK, resizeState.origWidth + dx);
    resizeState.box.style.width = nw + "px";
  } else {
    var nl = resizeState.origLeft + dx;
    var nw2 = resizeState.origWidth - dx;
    if (nw2 < WK) return;
    resizeState.box.style.left = nl + "px";
    resizeState.box.style.width = nw2 + "px";
  }
}
async function endResize(e) {
  if (!resizeState) return;
  var box = resizeState.box;
  var newLeft = parseInt(box.style.left);
  var newWidth = parseInt(box.style.width);
  var si = Math.max(0, Math.min(ALL_WEEKS.length-1, Math.round(newLeft / WK)));
  var ei = Math.max(si, Math.min(ALL_WEEKS.length-1, Math.round((newLeft + newWidth + 8) / WK) - 1));
  var newSW = ALL_WEEKS[si], newEW = ALL_WEEKS[ei];
  var ph = DB.phases.find(function(p){ return p.id === resizeState.phId; });
  if (ph) { ph.start_week = newSW; ph.end_week = newEW; }
  await dbPatch("phases", "id", resizeState.phId, { start_week:newSW, end_week:newEW });
  showToast("Resized: " + newSW + " to " + newEW);
  document.removeEventListener("mousemove", onResize);
  document.removeEventListener("mouseup", endResize);
  resizeState = null;
  renderBoard();
}

// ── Free-floating stickies ────────────────────────────────────────────────────
var freeDragState = null;
function startFreeDrag(e, fsId) {
  if (e.target.getAttribute("contenteditable") || e.target.tagName === "BUTTON") return;
  e.preventDefault();
  var el = document.getElementById("fs-" + fsId);
  if (!el) return;
  freeDragState = { fsId:fsId, el:el, startX:e.clientX, startY:e.clientY, origLeft:parseInt(el.style.left)||0, origTop:parseInt(el.style.top)||0 };
  el.style.zIndex = 50;
  document.addEventListener("mousemove", onFreeDrag);
  document.addEventListener("mouseup", endFreeDrag);
}
function onFreeDrag(e) {
  if (!freeDragState) return;
  freeDragState.el.style.left = (freeDragState.origLeft + e.clientX - freeDragState.startX) + "px";
  freeDragState.el.style.top  = (freeDragState.origTop  + e.clientY - freeDragState.startY) + "px";
}
async function endFreeDrag(e) {
  if (!freeDragState) return;
  var nx = parseInt(freeDragState.el.style.left);
  var ny = parseInt(freeDragState.el.style.top);
  freeDragState.el.style.zIndex = 10;
  var fs = DB.freeStickies ? DB.freeStickies.find(function(f){ return f.id === freeDragState.fsId; }) : null;
  if (fs) { fs.x = nx; fs.y = ny; }
  await dbPatch("free_stickies", "id", freeDragState.fsId, { x:nx, y:ny });
  document.removeEventListener("mousemove", onFreeDrag);
  document.removeEventListener("mouseup", endFreeDrag);
  freeDragState = null;
}

  // Save to Supabase so all users see the same label
  try {
    await fetch(SUPA_URL+"/rest/v1/settings?key=eq.pi_date_label", {
      method:"PATCH", headers:HDRS, body:JSON.stringify({value:newVal})
    });
    showToast("Date updated for everyone: " + newVal);
  } catch(e) {
    showToast("Saved locally. DB save failed: "+e.message, true);
  }

async function loadNavDate(){
  // Try Supabase first, fall back to localStorage
  try {
    var res = await fetch(SUPA_URL+"/rest/v1/settings?key=eq.pi_date_label&select=value", {headers:HDRS});
    var data = await res.json();
    if(Array.isArray(data) && data[0] && data[0].value) {
      document.getElementById("navDateDisplay").textContent = data[0].value;
      localStorage.setItem("pi_date_label", data[0].value);
      return;
    }
  } catch(e) {}
  // Fallback to localStorage
  var saved = localStorage.getItem("pi_date_label");
  if(saved) document.getElementById("navDateDisplay").textContent = saved;
}

        rowDefs.forEach(function(row){
          if(row.l==="Strong"){sld.addShape(pres.shapes.RECTANGLE,{x:.18,y:ry,w:1.3,h:row.h,fill:{color:row.bg},line:{color:row.bg}});sld.addText(row.l,{x:.18,y:ry,w:1.3,h:row.h,fontSize:12,color:WH,bold:true,align:"center",valign:"middle"});}
          else sld.addText(row.l,{x:.18,y:ry,w:1.3,h:row.h,fontSize:11,color:"404040",align:"left",valign:"middle"});
          ry+=row.h;
        });
        var cardW=(W-1.6-.35-.35-squads.length*.08)/squads.length,cardH=5.8,startX=1.6;
        squads.forEach(function(s,sci){
          var cx=startX+sci*(cardW+.08),sqc=s.color.replace("#","");
          sld.addShape(pres.shapes.ROUNDED_RECTANGLE,{x:cx,y:.82,w:cardW,h:cardH,fill:{color:WH},line:{color:sci===squads.length-1?PUR:"BBBBBB",pt:sci===squads.length-1?1.5:.8},rectRadius:.14});
          sld.addText(s.name.toUpperCase(),{x:cx,y:.92,w:cardW,h:.35,fontSize:9.5,color:"999999",align:"center"});
          var ry2=.82+.55;
          var artRows=["Plan baselined for PI2","Use cases scoped","Designs in progress","Dependencies identified"];
          rowDefs.forEach(function(row,ri){
            if(ri>0) sld.addShape(pres.shapes.RECTANGLE,{x:cx,y:ry2,w:cardW,h:row.h,fill:{color:"F3F4F6"},line:{color:"EEEEEE",pt:.2}});
            sld.addText(artRows[ri],{x:cx+.08,y:ry2,w:cardW-.16,h:row.h,fontSize:9,color:ri===0?"888888":"111827",italic:ri===0,valign:"middle",align:"center"});
            ry2+=row.h;
          });
        });
      }
      artSlide(pres.addSlide(),DB.squads.slice(0,3),18);
      artSlide(pres.addSlide(),DB.squads.slice(3,5),19);

      setProgress(92,"Slide 20: Day 2 Ends...");
      inter(pres.addSlide(),"Day 2 Ends \u2013 Thanks",20);

      setProgress(97,"Saving file...");
      pres.writeFile({fileName:"PI2_Planning_Workshop_July2026.pptx"}).then(function(){
        setProgress(100,"Done!");
        setTimeout(function(){
          document.getElementById("progressOverlay").classList.remove("show");
          btn.disabled=false;
          showToast("PowerPoint downloaded! 20 slides, both days.");
        },500);
      });
    }catch(e){
      document.getElementById("progressOverlay").classList.remove("show");
      btn.disabled=false;
      showToast("Export failed: "+e.message,true);
    }
  },100);
}

loadAll();
loadNavDate();
</script>
