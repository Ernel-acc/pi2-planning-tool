<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BT AI Ops – PI Planning Tool</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#F0EEF8;min-height:100vh}
nav{background:#4C1D95;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:200;flex-wrap:wrap;gap:8px}
.nav-brand{display:flex;align-items:center;gap:10px;padding:10px 0}
.nav-bar{width:5px;height:26px;background:#FCD34D;border-radius:2px}
.nav-title{color:#fff;font-weight:800;font-size:14px}
.nav-sub{color:#DDD6FE;font-size:10px}
.nav-date{background:rgba(255,255,255,.15);border-radius:6px;padding:3px 9px;color:#FCD34D;font-size:11px;font-weight:700}
.nav-right{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:8px 0}
.nav-tab{background:none;border:none;color:#DDD6FE;padding:8px 12px;cursor:pointer;font-size:11px;font-weight:400;border-bottom:2px solid transparent;white-space:nowrap}
.nav-tab.active{color:#FCD34D;font-weight:700;border-bottom-color:#FCD34D}
.btn-export{background:#FCD34D;color:#4C1D95;border:none;border-radius:7px;padding:7px 13px;cursor:pointer;font-weight:800;font-size:11px}
.squad-selector{display:flex;gap:6px;padding:12px 20px;flex-wrap:wrap;background:#E9E5F8;border-bottom:1px solid #D4D0EE;align-items:center}
.squad-btn{border:none;border-radius:20px;padding:5px 14px;cursor:pointer;font-size:11px;font-weight:700;transition:all .15s;border:1.5px solid transparent}
.board-container{padding:16px 20px;overflow-x:auto}
.board{min-width:1400px}
.squad-header-bar{border-radius:8px 8px 0 0;padding:10px 18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.squad-header-bar h2{color:#fff;font-size:18px;font-weight:800}
.board-top{display:grid;grid-template-columns:200px 1fr 280px 180px;gap:12px;padding:12px;background:#fff;border:1px solid #E5E0F8}
.panel-box{border-radius:8px;overflow:hidden}
.panel-title{padding:7px 10px;font-size:11px;font-weight:700;color:#fff;text-align:center}
.panel-body{padding:8px;background:#F8F6FF;min-height:80px}
.sticky{border-radius:4px;padding:5px 7px;font-size:9.5px;line-height:1.3;font-weight:500;cursor:pointer;transition:transform .1s,box-shadow .1s;word-break:break-word;box-shadow:1px 2px 4px rgba(0,0,0,.12);display:inline-block}
.sticky:hover{transform:scale(1.03);box-shadow:2px 4px 8px rgba(0,0,0,.18)}
.sticky.yellow{background:#FFE566;color:#1F1F1F}
.sticky.pink{background:#FF8FAB;color:#1F1F1F}
.sticky.purple{background:#C084FC;color:#1F1F1F}
.sticky.green{background:#86EFAC;color:#1F1F1F}
.sticky.white{background:#fff;color:#374151;border:1px solid #E5E7EB}
.sticky-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:5px}
.sprint-grid-wrap{background:#fff;border:1px solid #E5E0F8;border-top:none}
.sprint-headers{display:grid;border-bottom:1px solid #E5E0F8}
.sprint-header-cell{background:#6B2FBE;color:#fff;text-align:center;padding:7px 4px;font-size:11px;font-weight:700;border-right:1px solid #8B4FDE}
.sprint-header-cell.brp{background:#FCD34D;color:#1F2937}
.week-headers{display:grid;background:#F3F0FF;border-bottom:2px solid #E5E0F8}
.week-cell{padding:4px 2px;font-size:9px;color:#6B7280;text-align:center;border-right:1px solid #E5E0F8;font-weight:500}
.uc-row{display:grid;border-bottom:1px solid #EEE;min-height:160px}
.uc-label{padding:10px;border-right:1px solid #E5E0F8;display:flex;flex-direction:column;gap:4px;background:#FAFAFA}
.uc-label-badge{border-radius:5px;padding:5px 8px;font-size:10px;font-weight:700;color:#fff;text-align:center;line-height:1.3}
.uc-label-desc{font-size:9.5px;color:#6B7280;line-height:1.4;margin-top:4px}
.phase-box{border:1.5px solid #374151;background:#fff;border-radius:4px;padding:5px 8px;position:absolute}
.phase-box-header{font-size:9px;font-weight:700;color:#1F2937;margin-bottom:6px;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.phase-owner{font-size:8.5px;color:#6B7280;font-weight:400}
.phase-stickies{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.phase-label-big{border-radius:5px;padding:8px 12px;font-size:11px;font-weight:800;color:#fff;text-align:center;white-space:nowrap}
.phase-label-big.yellow{background:#F59E0B;color:#1F2937}
.phase-label-big.purple{background:#7C3AED}
.phase-label-big.green{background:#10B981}
.phase-label-big.teal{background:#0891B2}
.side-panels{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:12px;background:#fff;border:1px solid #E5E0F8;border-top:none}
.deps-panel{background:#F8F6FF;border-radius:8px;overflow:hidden}
.deps-panel-title{background:#6B2FBE;color:#fff;padding:8px 12px;font-size:12px;font-weight:700;text-align:center}
.deps-panel-body{padding:10px}
.deps-group{margin-bottom:10px}
.deps-group-label{font-size:10px;font-weight:700;color:#4C1D95;margin-bottom:5px}
.deps-sticky-row{display:flex;flex-wrap:wrap;gap:5px}
.stories-panel{background:#F8F6FF;border-radius:8px;overflow:hidden}
.stories-panel-title{background:#6B2FBE;color:#fff;padding:8px 12px;font-size:12px;font-weight:700;text-align:center}
.stories-panel-body{padding:10px;display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.story-empty{background:#FFE566;border-radius:4px;height:50px;opacity:.5}

/* Edit mode */
.edit-banner{background:#FEF3C7;border:1px solid #FCD34D;padding:6px 12px;font-size:11px;color:#92400E;font-weight:600;text-align:center;display:none}
.edit-banner.show{display:block}
.editable-sticky{cursor:text;border:2px dashed #7C3AED !important;min-width:80px;min-height:30px}
.add-sticky-btn{background:#FFF9C4;border:1.5px dashed #F59E0B;border-radius:4px;padding:4px 8px;font-size:9px;color:#92400E;cursor:pointer;font-weight:600}
.add-sticky-btn:hover{background:#FEF3C7}
.btn-del-sticky{position:absolute;top:-6px;right:-6px;width:16px;height:16px;background:#EF4444;color:#fff;border:none;border-radius:50%;cursor:pointer;font-size:9px;display:none;align-items:center;justify-content:center;font-weight:700;z-index:10}
.sticky-wrap{position:relative;display:inline-block}
.sticky-wrap:hover .btn-del-sticky{display:flex}

.toast{background:#D1FAE5;border:1px solid #6EE7B7;padding:8px 16px;font-size:11px;color:#065F46;font-weight:600;display:none;position:fixed;top:60px;right:20px;z-index:300;border-radius:6px;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.toast.show{display:block}
.toast.error{background:#FEE2E2;border-color:#FCA5A5;color:#991B1B}
.loading{display:flex;align-items:center;justify-content:center;padding:60px;font-size:14px;color:#6B7280}
.spinner{width:24px;height:24px;border:3px solid #EDE9FE;border-top-color:#7C3AED;border-radius:50%;animation:spin .8s linear infinite;margin-right:10px}
@keyframes spin{to{transform:rotate(360deg)}}
.progress-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:999;align-items:center;justify-content:center}
.progress-overlay.show{display:flex}
.progress-box{background:#fff;border-radius:12px;padding:28px 36px;text-align:center;min-width:260px}
.progress-title{font-weight:700;font-size:15px;color:#4C1D95;margin-bottom:8px}
.progress-sub{font-size:12px;color:#6B7280;margin-bottom:16px}
.progress-track{background:#F3F4F6;border-radius:20px;height:6px;overflow:hidden}
.progress-fill{background:#7C3AED;height:6px;border-radius:20px;transition:width .3s}
.view{display:none}
.view.active{display:block}

/* Inline edit input */
.inline-edit{background:rgba(255,255,0,.3);border:none;border-bottom:1px solid #7C3AED;font-family:inherit;font-size:inherit;font-weight:inherit;color:inherit;width:100%;outline:none;padding:1px 2px}
</style>
</head>
<body>
<nav>
  <div class="nav-brand">
    <div class="nav-bar"></div>
    <div>
      <div class="nav-sub">BT AI Ops</div>
      <div class="nav-title">PI Planning Tool</div>
    </div>
    <div class="nav-date">PI2 &mdash; July 2026</div>
  </div>
  <div class="nav-right">
    <button class="nav-tab active" onclick="switchView('board',this)">Planning Board</button>
    <button class="nav-tab" onclick="switchView('program',this)">Program Board</button>
    <button class="nav-tab" onclick="switchView('deps',this)">Dependencies</button>
    <button class="btn-export" onclick="exportPPTX()">&#8595; Export to PowerPoint</button>
  </div>
</nav>
<div class="squad-selector" id="squadSelector"><div class="spinner"></div> Loading squads...</div>
<div class="edit-banner" id="editBanner">&#9998; Edit mode ON — click any sticky to edit, use + to add new ones, hover to delete</div>
<div class="toast" id="toast"></div>
<div class="view active" id="view-board"><div class="board-container"><div class="board" id="mainBoard"><div class="loading"><div class="spinner"></div> Loading planning data from database...</div></div></div></div>
<div class="view" id="view-program"><div class="board-container"><div id="programBoard"></div></div></div>
<div class="view" id="view-deps"><div class="board-container"><div id="depsView"></div></div></div>
<div class="progress-overlay" id="progressOverlay">
  <div class="progress-box">
    <div class="progress-title">Generating PowerPoint&#8230;</div>
    <div class="progress-sub" id="progressSub">Building slides</div>
    <div class="progress-track"><div class="progress-fill" id="progressBar" style="width:0%"></div></div>
  </div>
</div>
<script>
// ── Supabase ──────────────────────────────────────────────────────────────────
var SUPA_URL = "https://jzufzorkfharnfvrjewk.supabase.co";
var SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp6dWZ6b3JrZmhhcm5mdnJqZXdrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5Mjk3MTEsImV4cCI6MjA5NjUwNTcxMX0.mGq4Ii_2xA-Le54vMMIKGtvT55Dqo7-5WjpxnsATgeM";
var sb = supabase.createClient(SUPA_URL, SUPA_KEY, {
  auth: { persistSession: false }
});

// ── State ─────────────────────────────────────────────────────────────────────
var DB = { squads:[], useCases:[], phases:[], stickies:[], floatingDeps:[], depGroups:[], depItems:[], teamMembers:[] };
var currentSquad = 0;
var currentView = "board";
var editMode = false;
var SPRINTS = [{name:"Sprint 1",weeks:["wk1","wk2"]},{name:"Sprint 2",weeks:["wk3","wk4"]},{name:"Sprint 3",weeks:["wk5","wk6"]},{name:"Sprint 4",weeks:["wk7","wk8"]},{name:"Sprint 5",weeks:["wk9","wk10"]},{name:"BRP",weeks:["wk11"]},{name:"Sprint 6",weeks:["wk12"]}];
var ALL_WEEKS = ["wk1","wk2","wk3","wk4","wk5","wk6","wk7","wk8","wk9","wk10","wk11","wk12"];
var WEEK_W = 88, LABEL_W = 170;

// ── Load all data ─────────────────────────────────────────────────────────────
async function loadAll() {
  try {
    // Test connection first
    var test = await sb.from("squads").select("count", {count:"exact",head:true});
    if (test.error) {
      document.getElementById("mainBoard").innerHTML = '<div style="padding:40px;text-align:center;color:#B91C1C;font-size:13px"><strong>Database connection failed:</strong><br>' + test.error.message + '<br><br><em>Please check the browser console (F12) for details.</em></div>';
      document.getElementById("squadSelector").innerHTML = '<span style="color:#B91C1C;font-size:12px">Connection failed: ' + test.error.message + '</span>';
      return;
    }

    var [sq,uc,ph,st,fd,dg,di,tm] = await Promise.all([
      sb.from("squads").select("*").order("name"),
      sb.from("use_cases").select("*").order("sort_order"),
      sb.from("phases").select("*").order("sort_order"),
      sb.from("stickies").select("*").order("sort_order"),
      sb.from("floating_deps").select("*").order("sort_order"),
      sb.from("dep_groups").select("*").order("sort_order"),
      sb.from("dep_items").select("*").order("sort_order"),
      sb.from("team_members").select("*").order("sort_order"),
    ]);

    if (sq.error) throw new Error("squads: " + sq.error.message);
    if (uc.error) throw new Error("use_cases: " + uc.error.message);

    DB.squads = sq.data || [];
    DB.useCases = uc.data || [];
    DB.phases = ph.data || [];
    DB.stickies = st.data || [];
    DB.floatingDeps = fd.data || [];
    DB.depGroups = dg.data || [];
    DB.depItems = di.data || [];
    DB.teamMembers = tm.data || [];

    if (DB.squads.length === 0) {
      document.getElementById("mainBoard").innerHTML = '<div style="padding:40px;text-align:center;color:#D97706;font-size:13px"><strong>No squads found in database.</strong><br>The SQL setup may not have run correctly.</div>';
      document.getElementById("squadSelector").innerHTML = '<span style="color:#D97706;font-size:12px">No squads found</span>';
      return;
    }

    renderSelector();
    renderBoard();
  } catch(e) {
    console.error("loadAll error:", e);
    document.getElementById("mainBoard").innerHTML = '<div style="padding:40px;text-align:center;color:#B91C1C;font-size:13px"><strong>Error loading data:</strong><br>' + e.message + '</div>';
    document.getElementById("squadSelector").innerHTML = '<span style="color:#B91C1C;font-size:12px">Error: ' + e.message + '</span>';
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function sq() { return DB.squads[currentSquad] || {}; }
function ucsFor(sqId) { return DB.useCases.filter(function(u){return u.squad_id===sqId}); }
function phasesFor(ucId) { return DB.phases.filter(function(p){return p.use_case_id===ucId}); }
function stickiesFor(phId) { return DB.stickies.filter(function(s){return s.phase_id===phId}); }
function floatFor(ucId) { return DB.floatingDeps.filter(function(f){return f.use_case_id===ucId}); }
function groupsFor(sqId) { return DB.depGroups.filter(function(g){return g.squad_id===sqId}); }
function itemsFor(gId) { return DB.depItems.filter(function(i){return i.group_id===gId}); }
function teamFor(sqId) { return DB.teamMembers.filter(function(t){return t.squad_id===sqId}); }
function wkIdx(wk) { return ALL_WEEKS.indexOf(wk); }

function showToast(msg,isError){
  var t=document.getElementById("toast");
  t.textContent=msg; t.className="toast show"+(isError?" error":"");
  setTimeout(function(){t.classList.remove("show")},4000);
}
function setProgress(pct,msg){
  document.getElementById("progressBar").style.width=pct+"%";
  if(msg) document.getElementById("progressSub").textContent=msg;
}

// ── Render selector ───────────────────────────────────────────────────────────
function renderSelector(){
  var el=document.getElementById("squadSelector");
  var html="";
  DB.squads.forEach(function(s,i){
    var active=i===currentSquad;
    html+='<button class="squad-btn" onclick="selectSquad('+i+')" style="background:'+(active?s.color:"#fff")+';color:'+(active?"#fff":s.color)+';border-color:'+s.color+'">'+s.name+'</button>';
  });
  html+='<button onclick="toggleEdit()" style="margin-left:auto;background:'+(editMode?"#FCD34D":"rgba(255,255,255,.7)")+';color:'+(editMode?"#4C1D95":"#374151")+';border:1.5px solid #D1D5DB;border-radius:20px;padding:5px 14px;cursor:pointer;font-size:11px;font-weight:700">'+(editMode?"&#10003; Save Changes":"&#9998; Edit")+'</button>';
  el.innerHTML=html;
}

// ── Render board ──────────────────────────────────────────────────────────────
function renderBoard(){
  var s=sq(); if(!s.id){return;}
  var board=document.getElementById("mainBoard");
  var html="";

  // Header
  html+='<div class="squad-header-bar" style="background:'+s.color+'">';
  html+='<h2>'+s.name+'</h2>';
  html+='<div style="display:flex;align-items:center;gap:10px">';
  // Confidence buttons
  html+='<div style="background:rgba(255,255,255,.15);border-radius:6px;padding:4px 10px;display:flex;align-items:center;gap:5px"><span style="color:#DDD6FE;font-size:10px">Confidence</span>';
  for(var v=1;v<=5;v++){
    html+='<button onclick="setConfidence('+v+')" style="width:20px;height:20px;border-radius:3px;border:none;cursor:pointer;font-size:10px;font-weight:700;background:'+(s.confidence>=v?"#FCD34D":"rgba(255,255,255,.25)")+';color:'+(s.confidence>=v?"#92400E":"rgba(255,255,255,.6)")+'">'+v+'</button>';
  }
  html+='</div></div></div>';

  // Top panels
  html+='<div class="board-top">';

  // Team capacity
  html+='<div class="panel-box"><div class="panel-title" style="background:'+s.color+'">Team Capacity</div><div class="panel-body"><div class="sticky-grid">';
  teamFor(s.id).forEach(function(m){
    html+='<div class="sticky yellow" style="font-size:9px"><strong>'+m.role+'</strong>'+(m.name?'<br>'+m.name:'')+'</div>';
  });
  html+='</div></div></div>';

  // Overview
  html+='<div class="panel-box"><div class="panel-title" style="background:'+s.color+'">'+s.name+' &mdash; Workstream Overview</div><div class="panel-body" style="font-size:10px;color:#6B7280;padding:10px"><em>Workstream overview &mdash; summarise key goals here</em></div></div>';

  // Deps summary
  html+='<div class="panel-box"><div class="panel-title" style="background:'+s.color+'">Dependencies &amp; Risks</div><div class="panel-body">';
  var risks=[], deps=[];
  groupsFor(s.id).forEach(function(g){ itemsFor(g.id).forEach(function(it){ if(it.color==="pink") risks.push(it.text); else deps.push(it.text); }); });
  if(risks.length){html+='<div style="font-size:9px;font-weight:700;color:#4C1D95;margin-bottom:4px">RISKS</div>'; risks.slice(0,2).forEach(function(r){html+='<div class="sticky pink" style="margin-bottom:4px;font-size:9px">'+r+'</div>';});}
  if(deps.length){html+='<div style="font-size:9px;font-weight:700;color:#4C1D95;margin:5px 0 4px">DEPS</div>'; deps.slice(0,2).forEach(function(d){html+='<div class="sticky yellow" style="margin-bottom:4px;font-size:9px">'+d+'</div>';});}
  html+='</div></div>';

  // Notes
  html+='<div class="panel-box"><div class="panel-title" style="background:'+s.color+'">Notes</div><div class="panel-body" style="font-size:9.5px;color:#374151">'+(s.notes||'<em style="color:#9CA3AF">Notes area</em>')+'</div></div>';
  html+='</div>';

  // Sprint grid
  var gridCols=LABEL_W+"px "+ALL_WEEKS.map(function(){return WEEK_W+"px";}).join(" ");
  html+='<div class="sprint-grid-wrap">';

  // Sprint header row
  html+='<div style="display:grid;grid-template-columns:'+LABEL_W+'px '+SPRINTS.map(function(sp){return sp.weeks.length*WEEK_W+"px";}).join(" ")+'"><div style="border-right:1px solid #E5E0F8;background:#F8F6FF"></div>';
  SPRINTS.forEach(function(sp){
    html+='<div class="sprint-header-cell '+(sp.name==="BRP"?"brp":"")+'">'+sp.name+'</div>';
  });
  html+='</div>';

  // Week subheaders
  html+='<div style="display:grid;grid-template-columns:'+gridCols+'"><div style="border-right:1px solid #E5E0F8;background:#F3F0FF;padding:4px 6px;font-size:9px;color:#6B7280;font-weight:600">Use Case</div>';
  ALL_WEEKS.forEach(function(wk){html+='<div class="week-cell">'+wk+'</div>';});
  html+='</div>';

  // Use case rows
  var ucs=ucsFor(s.id);
  ucs.forEach(function(uc){
    var phases=phasesFor(uc.id);
    var maxPhaseRow=0;
    phases.forEach(function(ph,pi){maxPhaseRow=Math.max(maxPhaseRow,pi);});
    var rowHeight=Math.max(160, (maxPhaseRow+1)*100+20);

    html+='<div style="display:grid;grid-template-columns:'+LABEL_W+'px 1fr;border-bottom:2px solid '+s.color+'44;min-height:'+rowHeight+'px">';

    // Label
    html+='<div class="uc-label"><div class="uc-label-badge" style="background:'+s.color+'">'+uc.name+'</div><div class="uc-label-desc">'+uc.description+'</div>';
    if(editMode){
      html+='<button onclick="addPhase(\''+uc.id+'\')" style="margin-top:6px;background:#EDE9FE;color:#4C1D95;border:1px dashed #7C3AED;border-radius:4px;padding:3px 6px;cursor:pointer;font-size:9px;font-weight:700">+ Phase</button>';
    }
    html+='</div>';

    // Canvas
    html+='<div style="position:relative;overflow:visible">';
    // BG columns
    html+='<div style="display:grid;grid-template-columns:'+ALL_WEEKS.map(function(){return WEEK_W+"px";}).join(" ")+';position:absolute;inset:0">';
    ALL_WEEKS.forEach(function(wk,wi){
      var isBRP=wk==="wk11";
      html+='<div style="border-right:1px solid #EEE;background:'+(isBRP?"#FFFBEB":(wi%2===0?"#FAFAFA":"#fff"))+';height:100%"></div>';
    });
    html+='</div>';

    // Phase boxes
    phases.forEach(function(ph,pi){
      var si=wkIdx(ph.start_week), ei=wkIdx(ph.end_week);
      if(si<0)si=0; if(ei<0)ei=ALL_WEEKS.length-1;
      var left=si*WEEK_W, width=(ei-si+1)*WEEK_W-8, top=10+pi*95;
      var stickies=stickiesFor(ph.id);

      html+='<div class="phase-box" style="left:'+left+'px;width:'+width+'px;top:'+top+'px;min-height:80px">';
      html+='<div class="phase-box-header"><span style="font-size:14px">&#128100;</span> '+ph.name+' <span class="phase-owner">'+ph.owner+'</span>';

    });
    if(editMode) html+='<button class="add-sticky-btn" onclick="addDepItem('+g.id+')">+ item</button>';
    html+='</div></div>';
  });
  html+='</div></div>';
  html+='<div class="stories-panel"><div class="stories-panel-title">User Stories</div><div class="stories-panel-body">';
  for(var i=0;i<12;i++) html+='<div class="story-empty"></div>';
  html+='</div></div>';
  html+='</div>';

  board.innerHTML=html;
}

// ── Program board ─────────────────────────────────────────────────────────────
function renderProgramBoard(){
  var el=document.getElementById("programBoard");
  var html='<div style="background:#fff;border-radius:10px;padding:18px;box-shadow:0 2px 12px rgba(0,0,0,.08);overflow-x:auto">';
  html+='<div style="font-weight:800;font-size:15px;color:#4C1D95;margin-bottom:12px">Program Board &mdash; All Squads</div>';
  html+='<table style="border-collapse:collapse;width:100%;font-size:10px;min-width:900px"><thead><tr>';
  html+='<th style="background:#4C1D95;color:#fff;padding:7px 10px;text-align:left;min-width:130px">Squad</th>';
  SPRINTS.forEach(function(sp){
    html+='<th style="background:'+(sp.name==="BRP"?"#FCD34D":"#4C1D95")+';color:'+(sp.name==="BRP"?"#1F2937":"#fff")+';padding:7px 4px;text-align:center;min-width:'+(sp.weeks.length*55)+'px" colspan="'+sp.weeks.length+'">'+sp.name+'</th>';
  });
  html+='</tr><tr><td style="background:#F3F0FF;padding:3px 8px;font-size:8px;color:#6B7280"></td>';
  ALL_WEEKS.forEach(function(wk){html+='<td style="background:#F3F0FF;padding:3px 4px;font-size:8px;color:#6B7280;text-align:center;border:1px solid #E5E0F8">'+wk+'</td>';});
  html+='</tr></thead><tbody>';
  DB.squads.forEach(function(s,qi){
    html+='<tr><td style="background:'+s.color+';color:#fff;padding:8px 10px;font-weight:700;font-size:9px;border-bottom:2px solid #fff">'+s.name+'</td>';
    ALL_WEEKS.forEach(function(wk,wi){
      var cells="";
      ucsFor(s.id).forEach(function(uc){
        phasesFor(uc.id).forEach(function(ph){
          var si=wkIdx(ph.start_week),ei=wkIdx(ph.end_week);
          if(si<=wi&&wi<=ei) cells+='<div style="background:'+s.color+';color:#fff;border-radius:3px;padding:2px 3px;margin-bottom:2px;font-size:7px;font-weight:600">'+uc.name.split(" ").slice(0,2).join(" ")+'</div>';
        });
      });
      html+='<td style="background:'+(qi%2===0?"#FAFAFA":"#fff")+';border:1px solid #EEE;padding:3px;vertical-align:top;min-width:55px">'+cells+'</td>';
    });
    html+='</tr>';
  });
  html+='</tbody></table></div>';
  el.innerHTML=html;
}

// ── Actions ───────────────────────────────────────────────────────────────────
function selectSquad(i){ currentSquad=i; renderSelector(); renderBoard(); }
function switchView(v,btn){
  currentView=v;
  document.querySelectorAll(".nav-tab").forEach(function(t){t.classList.remove("active")});
  btn.classList.add("active");
  document.querySelectorAll(".view").forEach(function(el){el.classList.remove("active")});
  document.getElementById("view-"+v).classList.add("active");
  if(v==="board") renderBoard();
  else if(v==="program") renderProgramBoard();
  else renderDepsView();
}
function toggleEdit(){
  editMode=!editMode;
  document.getElementById("editBanner").className="edit-banner"+(editMode?" show":"");
  renderSelector();
  renderBoard();
  if(!editMode) showToast("Changes saved to database!");
}
async function setConfidence(v){
  var s=sq();
  await sb.from("squads").update({confidence:v}).eq("id",s.id);
  s.confidence=v;
  renderSelector();
  renderBoard();
  showToast("Confidence updated to "+v+"/5");
}

// ── DB mutations ──────────────────────────────────────────────────────────────
async function updateSticky(id,text){
  await sb.from("stickies").update({text:text.trim()}).eq("id",id);
  var s=DB.stickies.find(function(x){return x.id===id});
  if(s) s.text=text.trim();
}
async function addSticky(phaseId){
  var text=prompt("New sticky text:");
  if(!text) return;
  var res=await sb.from("stickies").insert({phase_id:phaseId,text:text,color:"yellow",sort_order:999}).select();
  if(res.data) DB.stickies.push(res.data[0]);
  renderBoard();
  showToast("Sticky added!");
}
async function deleteSticky(id){
  if(!confirm("Delete this sticky?")) return;
  await sb.from("stickies").delete().eq("id",id);
  DB.stickies=DB.stickies.filter(function(s){return s.id!==id});
  renderBoard();
}
async function addFloatDep(ucId){
  var text=prompt("New floating dependency:");
  if(!text) return;
  var res=await sb.from("floating_deps").insert({use_case_id:ucId,text:text,sort_order:999}).select();
  if(res.data) DB.floatingDeps.push(res.data[0]);
  renderBoard();
}
async function updateFloatDep(id,text){
  await sb.from("floating_deps").update({text:text.trim()}).eq("id",id);
  var f=DB.floatingDeps.find(function(x){return x.id===id});
  if(f) f.text=text.trim();
}
async function deleteFloatDep(id){
  await sb.from("floating_deps").delete().eq("id",id);
  DB.floatingDeps=DB.floatingDeps.filter(function(f){return f.id!==id});
  renderBoard();
}
async function addDepItem(groupId){
  var text=prompt("New dependency/risk text:");
  if(!text) return;
  var color=prompt("Color? (yellow/pink/purple/green)","yellow");
  var res=await sb.from("dep_items").insert({group_id:groupId,text:text,color:color||"yellow",sort_order:999}).select();
  if(res.data) DB.depItems.push(res.data[0]);
  renderBoard();
}
async function updateDepItem(id,text){
  await sb.from("dep_items").update({text:text.trim()}).eq("id",id);
  var d=DB.depItems.find(function(x){return x.id===id});
  if(d) d.text=text.trim();
}
async function addUseCase(sqId){
  var name=prompt("Use case name:");
  if(!name) return;
  var desc=prompt("Short description:","");
  var id=sqId+"_uc_"+Date.now();
  var maxOrder=Math.max.apply(null,ucsFor(sqId).map(function(u){return u.sort_order||0}).concat([0]));
  var res=await sb.from("use_cases").insert({id:id,squad_id:sqId,name:name,description:desc||"",sort_order:maxOrder+1}).select();
  if(res.data) DB.useCases.push(res.data[0]);
  renderBoard();
  showToast("Use case added!");
}
async function addPhase(ucId){
  var name=prompt("Phase name (e.g. 1. Discovery):");
  if(!name) return;
  var startWk=prompt("Start week (e.g. wk1):","wk1");
  var endWk=prompt("End week (e.g. wk4):","wk4");
  var owner=prompt("Owner:","");
  var res=await sb.from("phases").insert({use_case_id:ucId,name:name,start_week:startWk||"wk1",end_week:endWk||"wk2",owner:owner||"",sort_order:999}).select();
  if(res.data) DB.phases.push(res.data[0]);
  renderBoard();
  showToast("Phase added!");
}
async function deletePhase(id,ucId){
  if(!confirm("Delete this phase and all its stickies?")) return;
  await sb.from("stickies").delete().eq("phase_id",id);
  await sb.from("phases").delete().eq("id",id);
  DB.stickies=DB.stickies.filter(function(s){return s.phase_id!==id});
  DB.phases=DB.phases.filter(function(p){return p.id!==id});
  renderBoard();
}
